<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#68d9ca",
                        "on-background": "#181c20",
                        "on-tertiary-fixed-variant": "#105139",
                        "on-primary-container": "#f7f9ff",
                        "surface-tint": "#00629e",
                        "surface-container-low": "#f2f3f9",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-surface": "#181c20",
                        "surface-bright": "#f7f9ff",
                        "on-secondary-fixed-variant": "#005049",
                        "inverse-surface": "#2d3135",
                        "surface-container-high": "#e6e8ee",
                        "error": "#ba1a1a",
                        "surface-container": "#eceef3",
                        "on-primary-fixed-variant": "#004a79",
                        "on-surface-variant": "#404751",
                        "background": "#f7f9ff",
                        "tertiary": "#28654c",
                        "inverse-on-surface": "#eff1f6",
                        "primary-fixed-dim": "#9acbff",
                        "surface-container-highest": "#e0e2e8",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#001d34",
                        "primary-container": "#0077be",
                        "primary": "#005e97",
                        "tertiary-container": "#437e64",
                        "primary-fixed": "#cfe5ff",
                        "surface-dim": "#d8dadf",
                        "secondary-fixed": "#86f5e6",
                        "tertiary-fixed": "#b1f0d0",
                        "error-container": "#ffdad6",
                        "secondary": "#006a61",
                        "outline-variant": "#c0c7d2",
                        "surface-variant": "#e0e2e8",
                        "secondary-container": "#83f2e3",
                        "surface": "#f7f9ff",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#96d4b5",
                        "on-tertiary-fixed": "#002114",
                        "on-secondary-container": "#006f65",
                        "inverse-primary": "#9acbff",
                        "outline": "#707882",
                        "on-tertiary-container": "#e8fff0",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#00201c",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hydro-gradient-btn {
            background: linear-gradient(135deg, #005e97 0%, #0077be 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-background font-body antialiased min-h-screen flex items-center justify-center">
<!-- Mobile Screen Container -->
<main class="w-[390px] h-[844px] bg-white relative overflow-hidden flex flex-col shadow-2xl">
<!-- Illustration Section (Top 55%) -->
<section class="h-[55%] w-full relative flex flex-col items-center justify-center px-10">
<!-- Background Decorative Fluid Element -->
<div class="absolute inset-0 z-0 flex items-center justify-center overflow-hidden">
<div class="w-[400px] h-[400px] bg-primary/5 rounded-full blur-3xl -translate-y-10"></div>
</div>
<!-- Vertical Live Tracking Timeline Illustration -->
<div class="z-10 w-full max-w-[280px] space-y-0">
<!-- Placed -->
<div class="flex items-start gap-4">
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-secondary text-on-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-0.5 h-10 bg-secondary/30"></div>
</div>
<div class="pt-1">
<p class="text-sm font-semibold text-on-surface">Order Placed</p>
<p class="text-[11px] text-on-surface-variant/70">10:42 AM</p>
</div>
</div>
<!-- Accepted -->
<div class="flex items-start gap-4">
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-secondary text-on-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-0.5 h-10 bg-secondary/30"></div>
</div>
<div class="pt-1">
<p class="text-sm font-semibold text-on-surface">Order Accepted</p>
<p class="text-[11px] text-on-surface-variant/70">10:45 AM</p>
</div>
</div>
<!-- On Way (Active) -->
<div class="flex items-start gap-4">
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center ring-4 ring-primary-container/20">
<span class="material-symbols-outlined animate-pulse text-[18px]">local_shipping</span>
</div>
<div class="w-0.5 h-10 bg-surface-container-highest"></div>
</div>
<div class="pt-1">
<p class="text-sm font-bold text-primary">On Way</p>
<p class="text-[11px] text-primary/70">Estimated 5 mins away</p>
</div>
</div>
<!-- Delivered -->
<div class="flex items-start gap-4 opacity-40">
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full border-2 border-surface-container-highest bg-surface flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-surface-container-highest">home</span>
</div>
</div>
<div class="pt-1">
<p class="text-sm font-semibold text-on-surface">Delivered</p>
</div>
</div>
</div>
<!-- Floating Map Snippet (Editorial Detail) -->
<div class="absolute right-6 top-1/4 w-32 h-32 rounded-2xl overflow-hidden shadow-lg border-2 border-white transform rotate-3">
<img class="w-full h-full object-cover" data-alt="minimalist aesthetic map of suburban streets with a blue tracking pin and a soft pastel blue water theme" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCgAPJPnkTQgjPMUNOKCjz8OrzHWsB5WYE6dgBROne5RAaClzbAo4nb1Itg49Z0GUaAI9O08e2ekQ2Egn5oSkAelv5weVPPjAvIZd7OpsB-qpg6Kn5Oi7onBrzdpIZTOSzmZm7-GHLPOtqOtj48Kx_IFFNybPxfktMxa9dSztBS1-cr5jOxx5qE347EFp7DjcPC83kiD5K_aN5O1au-Ufs_9Oq13elmoPxgacyDuHMjy8R6ZUMNk4MvM78xnqViP3_sOsNwRb-qQiK8"/>
</div>
</section>
<!-- Text Block & CTA Section (Bottom 45%) -->
<section class="h-[45%] w-full bg-surface-container-lowest rounded-t-[2.5rem] px-8 pt-12 pb-10 flex flex-col items-center text-center">
<!-- Headline -->
<h1 class="font-headline font-bold text-[24px] text-[#1A2340] leading-tight mb-4">
                Track Every Drop Live
            </h1>
<!-- Body Text -->
<p class="font-body text-[15px] text-[#74777C] leading-relaxed max-w-[260px] mb-8">
                Real-time updates at every step from shop to your door.
            </p>
<!-- Pagination Dots -->
<div class="flex gap-2 mb-10">
<div class="w-2 h-2 rounded-full bg-[#A0DEBF]"></div>
<div class="w-2 h-2 rounded-full bg-[#A0DEBF]"></div>
<div class="w-6 h-2 rounded-full bg-[#0077BE]"></div>
</div>
<!-- CTA Button -->
<div class="w-full mt-auto">
<button class="w-full h-[52px] hydro-gradient-btn text-white font-headline font-bold rounded-full shadow-[0_8px_16px_rgba(0,94,151,0.25)] flex items-center justify-center gap-2 transform active:scale-[0.98] transition-all">
                    Get Started
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</section>
<!-- Visual "Hydration" Polish - Subtle Overlay -->
<div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-primary-container opacity-20"></div>
</main>
</body></html>
