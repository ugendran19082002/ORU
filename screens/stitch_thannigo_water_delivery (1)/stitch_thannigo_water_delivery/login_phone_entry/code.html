<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c0c7d2",
                        "background": "#f7f9ff",
                        "surface-dim": "#d8dadf",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#105139",
                        "on-primary-fixed-variant": "#004a79",
                        "surface-container-high": "#e6e8ee",
                        "tertiary": "#28654c",
                        "tertiary-fixed": "#b1f0d0",
                        "surface": "#f7f9ff",
                        "primary-fixed": "#cfe5ff",
                        "surface-tint": "#00629e",
                        "on-secondary-fixed-variant": "#005049",
                        "on-secondary-fixed": "#00201c",
                        "surface-bright": "#f7f9ff",
                        "tertiary-fixed-dim": "#96d4b5",
                        "surface-container-low": "#f2f3f9",
                        "on-background": "#181c20",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#83f2e3",
                        "on-primary-fixed": "#001d34",
                        "on-error": "#ffffff",
                        "primary": "#005e97",
                        "on-error-container": "#93000a",
                        "outline": "#707882",
                        "secondary-fixed": "#86f5e6",
                        "primary-container": "#0077be",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#006f65",
                        "on-primary": "#ffffff",
                        "on-surface": "#181c20",
                        "primary-fixed-dim": "#9acbff",
                        "inverse-surface": "#2d3135",
                        "tertiary-container": "#437e64",
                        "secondary": "#006a61",
                        "inverse-primary": "#9acbff",
                        "surface-variant": "#e0e2e8",
                        "surface-container": "#eceef3",
                        "on-tertiary-fixed": "#002114",
                        "on-surface-variant": "#404751",
                        "on-primary-container": "#f7f9ff",
                        "surface-container-highest": "#e0e2e8",
                        "inverse-on-surface": "#eff1f6",
                        "secondary-fixed-dim": "#68d9ca",
                        "on-tertiary-container": "#e8fff0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F4F6FA;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .editorial-shadow {
            box-shadow: 0 12px 32px rgba(0, 119, 190, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-6 text-on-surface">
<!-- Login Container -->
<main class="w-full max-w-md">
<!-- Center white card -->
<div class="bg-surface-container-lowest rounded-[24px] editorial-shadow p-8 flex flex-col items-center">
<!-- Thannigo water drop logo -->
<div class="mb-8 relative group">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-300">
<span class="material-symbols-outlined text-white text-[48px]" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
</div>
<!-- Heading Cluster -->
<div class="text-center mb-8">
<h1 class="font-headline font-bold text-[26px] text-[#1A2340] tracking-tight mb-2">
                    Welcome back
                </h1>
<p class="font-body text-[#74777C] text-[14px]">
                    Enter your phone number to continue
                </p>
</div>
<!-- Phone Field Form -->
<form class="w-full space-y-6">
<div class="relative">
<div class="flex items-center h-14 border-[1.5px] border-[#A0DEBF] rounded-[12px] focus-within:border-primary-container focus-within:ring-2 focus-within:ring-primary/10 transition-all bg-white overflow-hidden">
<!-- Prefix -->
<div class="px-4 border-r border-[#A0DEBF]/40 h-full flex items-center">
<span class="text-primary-container font-bold text-base">+91</span>
</div>
<!-- Input -->
<input class="w-full border-none focus:ring-0 px-4 text-on-surface font-semibold text-base placeholder:text-outline/50 bg-transparent" maxlength="10" placeholder="10-digit number" required="" type="tel"/>
</div>
</div>
<!-- Send OTP Button -->
<button class="w-full h-[52px] bg-primary-container hover:bg-primary text-on-primary font-bold rounded-[14px] shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Send OTP
                </button>
</form>
<!-- Navigation Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    New user? 
                    <a class="text-primary-container font-bold hover:underline transition-all" href="#">Register here</a>
</p>
</div>
</div>
<!-- Terms Footer -->
<div class="mt-8 text-center px-4">
<p class="text-[#74777C] text-[11px] leading-relaxed">
                By continuing, you agree to our 
                <a class="underline font-medium hover:text-on-surface" href="#">Terms</a> 
                &amp; 
                <a class="underline font-medium hover:text-on-surface" href="#">Privacy Policy</a>
</p>
</div>
</main>
<!-- Visual Background Decorative Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container/10 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/10 blur-[120px] rounded-full -z-10"></div>
</body></html>
