<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Plus_Jakarta_Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#181c20",
                        "inverse-on-surface": "#eff1f6",
                        "primary-fixed": "#cfe5ff",
                        "tertiary-container": "#437e64",
                        "surface": "#f7f9ff",
                        "secondary-container": "#83f2e3",
                        "inverse-surface": "#2d3135",
                        "on-tertiary-fixed": "#002114",
                        "background": "#f7f9ff",
                        "tertiary": "#28654c",
                        "tertiary-fixed": "#b1f0d0",
                        "on-surface-variant": "#404751",
                        "on-primary-fixed": "#001d34",
                        "tertiary-fixed-dim": "#96d4b5",
                        "surface-container-highest": "#e0e2e8",
                        "on-tertiary-fixed-variant": "#105139",
                        "surface-tint": "#00629e",
                        "surface-container": "#eceef3",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c0c7d2",
                        "outline": "#707882",
                        "secondary-fixed-dim": "#68d9ca",
                        "on-tertiary-container": "#e8fff0",
                        "surface-container-high": "#e6e8ee",
                        "surface-dim": "#d8dadf",
                        "secondary": "#006a61",
                        "surface-variant": "#e0e2e8",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f7f9ff",
                        "surface-container-low": "#f2f3f9",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#005049",
                        "primary-fixed-dim": "#9acbff",
                        "on-secondary-fixed": "#00201c",
                        "on-secondary-container": "#006f65",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#004a79",
                        "primary-container": "#0077be",
                        "on-surface": "#181c20",
                        "error": "#ba1a1a",
                        "primary": "#005e97",
                        "secondary-fixed": "#86f5e6",
                        "inverse-primary": "#9acbff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#f7f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "16px",
                        "xl": "24px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .tonal-shift { background: linear-gradient(180deg, #f2f3f9 0%, #f7f9ff 100%); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top Navigation Bar (Custom implementation of TopAppBar) -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-[0_12px_32px_rgba(0,119,190,0.08)] px-4 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="text-lg font-extrabold text-[#0077BE] tracking-tight leading-tight">Add Manual Order</h1>
<div class="flex items-center gap-1.5 mt-0.5">
<span class="bg-[#FF9800] text-white text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">Phone Order</span>
</div>
</div>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img class="w-full h-full object-cover" data-alt="professional male profile photo with a friendly expression in a modern office setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkW3DE6DSkf9sbGoIBfYfVbdWbQsmjJyBRyg7Gvr772MWj2FcMKKELiNHv8USvpxDahzCtvgQ4ChyhPdI-g1KGBVFLKc03bQ9BUHiaq1SWfkH0ZYkaiCQcuIpc9H68nLpo-3bTM1x62HHubeXNKiR0_wTohJMUyw5DMsVsJjg67-qeB7WcGFiU8JLP_ARQVY_90-FAM1y-Eby0Z-mlMvfTfGspDdOT7YGE_kvU7Usurb_3T7FfL7Pf5F0YS4m4a3AocyJMj8zwthdj"/>
</div>
</header>
<main class="pt-24 px-4 space-y-6">
<!-- Customer Lookup Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-widest opacity-60">Customer Details</h2>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
<span class="ms-2 text-xs font-semibold text-on-surface-variant">New Customer</span>
</label>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">search</span>
</div>
<input class="block w-full pl-10 pr-4 py-4 bg-surface-container-low border-0 rounded-xl text-sm focus:ring-2 focus:ring-primary-container text-on-surface placeholder-on-surface-variant/50 transition-all" placeholder="Search name or phone number..." type="text"/>
</div>
</section>
<!-- Order Items Section -->
<section class="space-y-4 bg-surface-container-low p-5 rounded-xl">
<div class="flex items-center justify-between">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-widest opacity-60">Select Product</h2>
<span class="text-xl font-extrabold text-[#0077BE]">₹90.00</span>
</div>
<div class="flex gap-2">
<button class="flex-1 py-3 px-2 rounded-xl bg-primary-container text-white border-2 border-primary-container flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform">
<span class="text-xs font-bold">20L</span>
<span class="text-[10px] opacity-80 italic">Standard</span>
</button>
<button class="flex-1 py-3 px-2 rounded-xl bg-white text-on-surface-variant border-2 border-transparent hover:border-outline-variant flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform">
<span class="text-xs font-bold">10L</span>
<span class="text-[10px] opacity-60">Medium</span>
</button>
<button class="flex-1 py-3 px-2 rounded-xl bg-white text-on-surface-variant border-2 border-transparent hover:border-outline-variant flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform">
<span class="text-xs font-bold">5L</span>
<span class="text-[10px] opacity-60">Small</span>
</button>
</div>
<div class="flex items-center justify-between pt-2">
<span class="text-xs font-semibold text-on-surface-variant">Quantity</span>
<div class="flex items-center gap-4 bg-white rounded-xl p-1 shadow-sm border border-outline-variant/20">
<button class="w-8 h-8 flex items-center justify-center text-primary font-bold hover:bg-surface-container transition-colors rounded-lg">-</button>
<span class="text-sm font-bold w-4 text-center">03</span>
<button class="w-8 h-8 flex items-center justify-center text-primary font-bold hover:bg-surface-container transition-colors rounded-lg">+</button>
</div>
</div>
</section>
<!-- Delivery & Schedule -->
<section class="space-y-4">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-widest opacity-60">Delivery Details</h2>
<div class="space-y-3">
<div class="relative">
<textarea class="block w-full px-4 py-3 bg-surface-container-low border-0 rounded-xl text-sm focus:ring-2 focus:ring-primary-container text-on-surface placeholder-on-surface-variant/50 transition-all" placeholder="Full delivery address..." rows="2"></textarea>
</div>
<div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
<button class="whitespace-nowrap px-4 py-2 bg-secondary-fixed text-on-secondary-fixed rounded-full text-xs font-bold flex items-center gap-1 active:scale-95 transition-all">
                        Now <span class="text-[10px]">⚡</span>
</button>
<button class="whitespace-nowrap px-4 py-2 bg-white text-on-surface-variant border border-outline-variant/30 rounded-full text-xs font-bold active:scale-95 transition-all">
                        Today
                    </button>
<button class="whitespace-nowrap px-4 py-2 bg-white text-on-surface-variant border border-outline-variant/30 rounded-full text-xs font-bold active:scale-95 transition-all">
                        Tomorrow
                    </button>
<button class="whitespace-nowrap px-4 py-2 bg-white text-on-surface-variant border border-outline-variant/30 rounded-full text-xs font-bold active:scale-95 transition-all">
                        Custom
                    </button>
</div>
<input class="block w-full px-4 py-3 bg-white border border-outline-variant/20 rounded-xl text-sm focus:ring-2 focus:ring-primary-container text-on-surface placeholder-on-surface-variant/40" placeholder="Add a note (e.g. Leave at gate)" type="text"/>
</div>
</section>
<!-- Payment & Assignment -->
<section class="grid grid-cols-2 gap-4">
<div class="space-y-3">
<h2 class="text-xs font-bold text-on-surface uppercase tracking-widest opacity-60">Payment</h2>
<div class="space-y-2">
<label class="flex items-center gap-2 p-2.5 bg-white border border-outline-variant/10 rounded-lg cursor-pointer">
<input checked="" class="text-primary focus:ring-primary h-4 w-4" name="payment" type="radio"/>
<span class="text-xs font-semibold">COD</span>
</label>
<label class="flex items-center gap-2 p-2.5 bg-white border border-outline-variant/10 rounded-lg cursor-pointer">
<input class="text-primary focus:ring-primary h-4 w-4" name="payment" type="radio"/>
<span class="text-xs font-semibold">UPI</span>
</label>
<label class="flex items-center gap-2 p-2.5 bg-white border border-outline-variant/10 rounded-lg cursor-pointer">
<input class="text-primary focus:ring-primary h-4 w-4" name="payment" type="radio"/>
<span class="text-xs font-semibold text-error">Credit</span>
</label>
</div>
</div>
<div class="space-y-3">
<h2 class="text-xs font-bold text-on-surface uppercase tracking-widest opacity-60">Assign To</h2>
<div class="relative">
<select class="w-full pl-3 pr-8 py-3 bg-white border border-outline-variant/20 rounded-xl text-xs font-semibold focus:ring-2 focus:ring-primary-container appearance-none">
<option>Rajesh (Online)</option>
<option>Kumar (Online)</option>
<option>Suresh (Busy)</option>
<option>Manual Pickup</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none">
<span class="material-symbols-outlined text-outline text-sm">expand_more</span>
</div>
</div>
<div class="flex items-center gap-2 p-3 bg-[#48BCAE]/10 rounded-xl">
<div class="w-2 h-2 rounded-full bg-[#48BCAE] animate-pulse"></div>
<span class="text-[10px] font-bold text-[#006a61]">4 staff available</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-2xl shadow-[0_-8px_24px_rgba(0,0,0,0.04)] z-40">
<button class="w-full py-4 bg-[#0077BE] text-white font-bold rounded-xl shadow-lg shadow-[#0077BE]/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Place Order</span>
<span class="material-symbols-outlined text-xl">shopping_cart_checkout</span>
</button>
</div>
<!-- Hidden Navigation (Requirement from JSON/System but transactional page) -->
<nav class="hidden md:flex fixed right-8 top-1/2 -translate-y-1/2 flex-col gap-6 bg-white/80 backdrop-blur-xl p-4 rounded-3xl shadow-2xl z-50">
<a class="text-[#0077BE] flex flex-col items-center gap-1" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-bold">Orders</span>
</a>
<a class="text-slate-400 hover:text-[#0077BE] flex flex-col items-center gap-1 transition-colors" href="#">
<span class="material-symbols-outlined">storefront</span>
<span class="text-[10px] font-bold">Shop</span>
</a>
</nav>
</body></html>
