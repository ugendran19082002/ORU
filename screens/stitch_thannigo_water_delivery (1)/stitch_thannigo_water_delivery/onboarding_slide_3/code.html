<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo Onboarding - Track Every Drop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#404751",
                        "tertiary-container": "#437e64",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2d3135",
                        "tertiary-fixed-dim": "#96d4b5",
                        "secondary": "#006a61",
                        "primary-fixed-dim": "#9acbff",
                        "on-surface": "#181c20",
                        "on-secondary-fixed-variant": "#005049",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f3f9",
                        "on-tertiary-fixed-variant": "#105139",
                        "on-primary-fixed-variant": "#004a79",
                        "tertiary": "#28654c",
                        "surface-variant": "#e0e2e8",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#b1f0d0",
                        "inverse-primary": "#9acbff",
                        "on-background": "#181c20",
                        "secondary-fixed-dim": "#68d9ca",
                        "on-tertiary-fixed": "#002114",
                        "on-secondary-fixed": "#00201c",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e6e8ee",
                        "background": "#f7f9ff",
                        "surface-tint": "#00629e",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-container": "#83f2e3",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f7f9ff",
                        "on-tertiary-container": "#e8fff0",
                        "primary-fixed": "#cfe5ff",
                        "outline-variant": "#c0c7d2",
                        "surface-container-highest": "#e0e2e8",
                        "primary": "#005e97",
                        "on-secondary-container": "#006f65",
                        "outline": "#707882",
                        "inverse-on-surface": "#eff1f6",
                        "surface": "#f7f9ff",
                        "on-primary-fixed": "#001d34",
                        "surface-dim": "#d8dadf",
                        "secondary-fixed": "#86f5e6",
                        "primary-container": "#0077be",
                        "on-primary-container": "#f7f9ff",
                        "surface-container": "#eceef3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-between overflow-hidden">
<!-- Top AppBar - Minimal for Onboarding -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-white/70 backdrop-blur-xl">
<span class="text-2xl font-black text-primary-container tracking-tight font-headline">Thannigo</span>
<button class="text-slate-500 font-semibold text-sm hover:opacity-80 transition-opacity">Skip</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-md mx-auto pt-24 pb-32 flex flex-col items-center px-8 relative">
<!-- Illustration Area: Vertical Timeline Asymmetric Layout -->
<div class="w-full bg-surface-container-low rounded-[2.5rem] p-8 mb-12 shadow-[0_20px_50px_rgba(0,119,190,0.05)] relative border border-white/50">
<div class="flex flex-col gap-8 relative">
<!-- Timeline Line -->
<div class="absolute left-6 top-8 bottom-8 w-1 bg-gradient-to-b from-primary-container via-primary-container to-surface-variant rounded-full"></div>
<!-- Status 1: Placed -->
<div class="flex items-center gap-6 relative z-10">
<div class="w-12 h-12 rounded-full bg-primary-container text-white flex items-center justify-center shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div>
<p class="font-headline font-bold text-lg text-primary-container leading-tight">Placed</p>
<p class="text-sm text-on-surface-variant">Order confirmed at 10:30 AM</p>
</div>
</div>
<!-- Status 2: Accepted -->
<div class="flex items-center gap-6 relative z-10">
<div class="w-12 h-12 rounded-full bg-primary-container text-white flex items-center justify-center shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div>
<p class="font-headline font-bold text-lg text-primary-container leading-tight">Accepted</p>
<p class="text-sm text-on-surface-variant">Shop is preparing your jars</p>
</div>
</div>
<!-- Status 3: On Way (Active State) -->
<div class="flex items-center gap-6 relative z-10">
<div class="w-12 h-12 rounded-full bg-white border-4 border-primary-container text-primary-container flex items-center justify-center shadow-xl ring-8 ring-primary-container/10">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
<div>
<p class="font-headline font-extrabold text-xl text-primary-container leading-tight">On Way</p>
<p class="text-sm font-semibold text-primary">Arriving in 8 mins</p>
</div>
</div>
<!-- Status 4: Delivered -->
<div class="flex items-center gap-6 relative z-10 opacity-40">
<div class="w-12 h-12 rounded-full bg-surface-variant text-outline flex items-center justify-center">
<span class="material-symbols-outlined">inventory_2</span>
</div>
<div>
<p class="font-headline font-bold text-lg text-on-surface-variant leading-tight">Delivered</p>
<p class="text-sm text-on-surface-variant">Pending arrival</p>
</div>
</div>
</div>
<!-- Floating Decorative Map Element -->
<div class="absolute -right-4 top-1/2 -translate-y-1/2 w-32 h-40 rounded-2xl bg-white shadow-2xl overflow-hidden border-4 border-white rotate-6 hidden sm:block">
<img class="w-full h-full object-cover" data-alt="abstract stylized map with blue gps delivery route and location marker pins in clean digital design" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKRsDJOiIoP8Js2EO6W6vhPTJ55xjbT1EF7AbdYhjQW-VF4Ja4hJl__cEANZCuw9o923MkLcbl-C-h6xmk9L1as-fNbFOUE8hB-_hKH2T0R1pG3u1qUn1GDVpxd-apmhRp3RBHLR-dzppgVOl-cmROXeFd6Du1LXKpzKXQJAaZB4CPseHO2WNU91jxSK2_dgkUagS1Oy9OopIFrP4Ew-EgOVfFZfKXLOgh_XgPpGaBkckdwiJkFT7bl-FVvLm442kkmYflsb2OnoeC"/>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4">
<h1 class="font-headline font-bold text-on-surface text-[24px] leading-tight tracking-tight" style="color: #1A2340;">
                Track Every Drop Live
            </h1>
<p class="font-body text-[15px] leading-relaxed max-w-[280px] mx-auto" style="color: #74777C;">
                Real-time updates at every step from shop to your door.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="fixed bottom-0 left-0 w-full px-8 pb-10 pt-4 bg-gradient-to-t from-surface via-surface to-transparent flex flex-col items-center gap-8">
<!-- Pagination Dots -->
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-6 h-2 rounded-full bg-primary-container transition-all duration-300"></div>
</div>
<!-- CTA Button -->
<button class="w-full max-w-md h-[52px] bg-primary-container text-white font-bold rounded-xl shadow-[0_12px_32px_rgba(0,119,190,0.15)] flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all">
            Get Started
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</footer>
<!-- Background Decorative Elements -->
<div class="fixed -top-24 -left-24 w-96 h-96 bg-primary-container/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -bottom-24 -right-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
