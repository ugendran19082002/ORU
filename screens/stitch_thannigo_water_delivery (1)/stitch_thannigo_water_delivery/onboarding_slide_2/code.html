<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#404751",
                    "tertiary-container": "#437e64",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#2d3135",
                    "tertiary-fixed-dim": "#96d4b5",
                    "secondary": "#006a61",
                    "primary-fixed-dim": "#9acbff",
                    "on-surface": "#181c20",
                    "on-secondary-fixed-variant": "#005049",
                    "on-secondary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f2f3f9",
                    "on-tertiary-fixed-variant": "#105139",
                    "on-primary-fixed-variant": "#004a79",
                    "tertiary": "#28654c",
                    "surface-variant": "#e0e2e8",
                    "error": "#ba1a1a",
                    "tertiary-fixed": "#b1f0d0",
                    "inverse-primary": "#9acbff",
                    "on-background": "#181c20",
                    "secondary-fixed-dim": "#68d9ca",
                    "on-tertiary-fixed": "#002114",
                    "on-secondary-fixed": "#00201c",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e6e8ee",
                    "background": "#f7f9ff",
                    "surface-tint": "#00629e",
                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "secondary-container": "#83f2e3",
                    "error-container": "#ffdad6",
                    "surface-bright": "#f7f9ff",
                    "on-tertiary-container": "#e8fff0",
                    "primary-fixed": "#cfe5ff",
                    "outline-variant": "#c0c7d2",
                    "surface-container-highest": "#e0e2e8",
                    "primary": "#005e97",
                    "on-secondary-container": "#006f65",
                    "outline": "#707882",
                    "inverse-on-surface": "#eff1f6",
                    "surface": "#f7f9ff",
                    "on-primary-fixed": "#001d34",
                    "surface-dim": "#d8dadf",
                    "secondary-fixed": "#86f5e6",
                    "primary-container": "#0077be",
                    "on-primary-container": "#f7f9ff",
                    "surface-container": "#eceef3"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center overflow-hidden">
<!-- Top Navigation (Suppressing Shell as per Transactional/Onboarding Rule) -->
<header class="w-full flex justify-end items-center px-6 pt-8">
<button class="text-on-surface-variant font-semibold text-sm hover:text-primary transition-colors">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-md px-8 relative">
<!-- Illustration Container: Asymmetrical & High End -->
<div class="relative w-full aspect-square mb-12 flex items-center justify-center">
<!-- Decorative Blobs for Depth -->
<div class="absolute inset-0 bg-primary-fixed opacity-10 rounded-full blur-3xl -z-10 translate-x-4"></div>
<div class="relative w-full h-full flex items-center justify-center">
<!-- Abstract "Flow" Elements -->
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-fixed/20 rounded-full blur-xl"></div>
<!-- Main Illustration Placeholder with Detailed Alt -->
<div class="w-full h-full rounded-xl overflow-hidden shadow-[0_20px_50px_rgba(0,119,190,0.1)] bg-white p-4">
<img class="w-full h-full object-cover rounded-lg" data-alt="Modern 3D illustration of a human hand tapping a smartphone screen while a 20L water can flies toward a minimalist house in the background, vibrant blue tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6xOIh7ny64id_zpXxTydccMZNDYryamAnPVClwy--DrgCyAJh-NWtEIlamovWSINR0HLsLHb7Hiy7FGHA0MuF9xy52v__WD77s0BA4PgHzQzIzVtHH3cpnXVUk8rJxxtbwh17MZyqt8sqyEJ37tYNoLmz9BksNXnXKTmnMJAhffcGveyJZ0G_qxZvwg8N4BeS9q0wBoEu2nCRy8rndSoS9O0ZvBv2YEypn-0qiPmrI7AnGBrHzGJLOiXHt06hmS4iUxlmXsUXAyB1"/>
</div>
<!-- Floating Badge for "30 Min" Context -->
<div class="absolute -bottom-4 -right-2 bg-primary-container text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-bold text-sm tracking-tight">30 MINS</span>
</div>
</div>
</div>
<!-- Text Content Area: Editorial Spacing -->
<div class="text-center space-y-4">
<h1 class="text-[24px] font-extrabold text-[#1A2340] leading-tight tracking-tight px-4">
                Order in 2 Taps, Delivered in 30 Min
            </h1>
<p class="text-[15px] text-[#74777C] leading-relaxed max-w-[280px] mx-auto font-medium">
                Choose quantity, pay via UPI or Cash, track live.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="w-full max-w-md px-8 pb-12 pt-6 flex flex-col items-center gap-10">
<!-- Pagination Dots: 2nd Active -->
<div class="flex gap-2">
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
<div class="h-1.5 w-6 rounded-full bg-primary-container"></div>
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
</div>
<!-- Primary CTA: Solid Brand Primary -->
<button class="w-full h-[52px] bg-primary-container text-white rounded-xl font-bold text-base shadow-[0_12px_32px_rgba(0,119,190,0.15)] hover:scale-[0.98] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
            Next
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</footer>
<!-- Background Elements (Quiet Luxury Aesthetic) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px] -z-20"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary/5 rounded-full blur-[100px] -z-20"></div>
</body></html>
