<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo - OTP Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-background": "#181c20",
                    "surface": "#f7f9ff",
                    "secondary-fixed-dim": "#68d9ca",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "background": "#f7f9ff",
                    "tertiary-fixed": "#b1f0d0",
                    "surface-container-highest": "#e0e2e8",
                    "inverse-primary": "#9acbff",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#404751",
                    "inverse-on-surface": "#eff1f6",
                    "on-primary-container": "#f7f9ff",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f7f9ff",
                    "secondary-fixed": "#86f5e6",
                    "surface-container": "#eceef3",
                    "on-primary-fixed-variant": "#004a79",
                    "primary-fixed": "#cfe5ff",
                    "on-tertiary-fixed-variant": "#105139",
                    "on-secondary-fixed": "#00201c",
                    "surface-container-low": "#f2f3f9",
                    "on-surface": "#181c20",
                    "primary-container": "#0077be",
                    "inverse-surface": "#2d3135",
                    "tertiary-container": "#437e64",
                    "on-tertiary-fixed": "#002114",
                    "secondary-container": "#83f2e3",
                    "tertiary": "#28654c",
                    "primary-fixed-dim": "#9acbff",
                    "outline-variant": "#c0c7d2",
                    "secondary": "#006a61",
                    "outline": "#707882",
                    "surface-variant": "#e0e2e8",
                    "surface-container-high": "#e6e8ee",
                    "on-primary-fixed": "#001d34",
                    "on-tertiary": "#ffffff",
                    "surface-dim": "#d8dadf",
                    "primary": "#005e97",
                    "on-tertiary-container": "#e8fff0",
                    "surface-container-lowest": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .otp-input {
            width: 52px;
            height: 58px;
            background-color: #EEF7FF;
            border: 1.5px solid #A0DEBF;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #1A2340;
            font-family: 'Plus Jakarta Sans';
        }
        .primary-gradient {
            background: linear-gradient(135deg, #005e97 0%, #0077be 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface flex items-center justify-center min-h-screen">
<!-- Mobile Shell Mockup (390px) -->
<main class="w-[390px] h-[844px] bg-background relative overflow-hidden flex flex-col items-center justify-center p-6">
<!-- App Bar Logic: Suppressed because this is a focused transactional screen -->
<div class="w-full bg-surface-container-lowest rounded-2xl p-8 shadow-[0_12px_32px_rgba(24,28,32,0.06)] flex flex-col items-center">
<!-- Header Section -->
<div class="mb-8 flex flex-col items-center text-center">
<div class="w-12 h-12 mb-4 text-primary-container">
<span class="material-symbols-outlined !text-5xl" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<h1 class="font-headline font-bold text-[26px] text-on-background tracking-tight mb-2">Enter OTP</h1>
<p class="text-on-surface-variant text-sm leading-relaxed">
                    Enter OTP sent to +91 98765XXXXX
                    <a class="text-primary-container font-semibold ml-1 hover:underline" href="#">Change</a>
</p>
</div>
<!-- OTP Input Grid -->
<div class="flex justify-between w-full gap-2 mb-8">
<div class="otp-input flex items-center justify-center">8</div>
<div class="otp-input flex items-center justify-center">4</div>
<div class="otp-input flex items-center justify-center">2</div>
<input class="otp-input focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" type="text" value=""/>
</div>
<!-- Action Button -->
<button class="w-full h-[52px] primary-gradient text-on-primary font-headline font-semibold rounded-xl text-lg shadow-sm active:scale-[0.98] transition-transform">
                Verify OTP
            </button>
<!-- Resend Logic -->
<div class="mt-6 flex items-center gap-1.5">
<span class="text-sm font-medium text-on-surface-variant">Resend in</span>
<span class="text-sm font-bold text-[#FF9800]">28s</span>
</div>
<!-- Biometric Option -->
<button class="mt-8 flex items-center gap-2 group">
<span class="material-symbols-outlined text-primary-container group-active:scale-90 transition-transform" data-icon="fingerprint">fingerprint</span>
<span class="text-primary-container font-headline font-semibold text-sm">Use Fingerprint / Face ID</span>
</button>
<!-- Security Badge -->
<div class="mt-10 pt-6 w-full border-t border-outline-variant/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-secondary text-base" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-secondary text-xs font-semibold tracking-wide">Secure · OTP expires in 5 min</span>
</div>
</div>
<!-- Decorative background elements to simulate Atmosphere -->
<div class="absolute top-[-100px] right-[-100px] w-64 h-64 bg-primary-container/5 rounded-full blur-3xl -z-10"></div>
<div class="absolute bottom-[-100px] left-[-100px] w-64 h-64 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
</main>
<!-- Bottom Navigation Suppressed for OTP Journey Focus -->
</body></html>
