<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo - OTP Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#68d9ca",
                    "on-background": "#181c20",
                    "on-tertiary-fixed-variant": "#105139",
                    "on-primary-container": "#f7f9ff",
                    "surface-tint": "#00629e",
                    "surface-container-low": "#f2f3f9",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-surface": "#181c20",
                    "surface-bright": "#f7f9ff",
                    "on-secondary-fixed-variant": "#005049",
                    "inverse-surface": "#2d3135",
                    "surface-container-high": "#e6e8ee",
                    "error": "#ba1a1a",
                    "surface-container": "#eceef3",
                    "on-primary-fixed-variant": "#004a79",
                    "on-surface-variant": "#404751",
                    "background": "#f7f9ff",
                    "tertiary": "#28654c",
                    "inverse-on-surface": "#eff1f6",
                    "primary-fixed-dim": "#9acbff",
                    "surface-container-highest": "#e0e2e8",
                    "on-primary": "#ffffff",
                    "on-primary-fixed": "#001d34",
                    "primary-container": "#0077be",
                    "primary": "#005e97",
                    "tertiary-container": "#437e64",
                    "primary-fixed": "#cfe5ff",
                    "surface-dim": "#d8dadf",
                    "secondary-fixed": "#86f5e6",
                    "tertiary-fixed": "#b1f0d0",
                    "error-container": "#ffdad6",
                    "secondary": "#006a61",
                    "outline-variant": "#c0c7d2",
                    "surface-variant": "#e0e2e8",
                    "secondary-container": "#83f2e3",
                    "surface": "#f7f9ff",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#96d4b5",
                    "on-tertiary-fixed": "#002114",
                    "on-secondary-container": "#006f65",
                    "inverse-primary": "#9acbff",
                    "outline": "#707882",
                    "on-tertiary-container": "#e8fff0",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#00201c",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            outline: none;
            border-color: #0077be;
            border-width: 2px;
            background-color: #EEF7FF;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F4F6FA] min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main OTP Container -->
<main class="w-full max-w-[390px] mx-auto">
<!-- Header Branding (Editorial Style) -->
<div class="mb-10 pl-2">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">waves</span>
<span class="text-2xl font-extrabold bg-gradient-to-br from-[#005e97] to-[#0077be] bg-clip-text text-transparent font-headline tracking-tight">Thannigo</span>
</div>
<p class="text-on-surface-variant text-sm font-medium">Safe &amp; Pure Hydration Journey</p>
</div>
<!-- Verification Card -->
<div class="bg-surface-container-lowest rounded-2xl shadow-[0_12px_40px_rgba(0,94,151,0.08)] p-8 relative overflow-hidden">
<!-- Content Header -->
<div class="mb-8">
<h1 class="text-[26px] font-bold text-[#1A2340] mb-2 leading-tight">Verify OTP</h1>
<p class="text-[#74777C] text-[14px] leading-relaxed">
                    Enter OTP sent to +91 98765XXXXX 
                    <a class="text-[#0077BE] font-semibold ml-1 hover:underline" href="#">Change</a>
</p>
</div>
<!-- OTP Input Grid -->
<div class="grid grid-cols-6 gap-2 mb-8">
<!-- State: Active/Filled style simulation -->
<input class="otp-input w-[52px] h-[58px] text-center text-xl font-bold rounded-xl border-[#A0DEBF] border-2 bg-[#EEF7FF] text-primary" maxlength="1" type="text" value="4"/>
<input class="otp-input w-[52px] h-[58px] text-center text-xl font-bold rounded-xl border-[#A0DEBF] border-2 bg-[#EEF7FF] text-primary" maxlength="1" type="text" value="2"/>
<input autofocus="" class="otp-input w-[52px] h-[58px] text-center text-xl font-bold rounded-xl border-[#A0DEBF] border-2 bg-surface-container-lowest focus:border-primary transition-all" maxlength="1" type="text"/>
<input class="otp-input w-[52px] h-[58px] text-center text-xl font-bold rounded-xl border-[#A0DEBF] border-2 bg-surface-container-lowest focus:border-primary transition-all" maxlength="1" type="text"/>
<input class="otp-input w-[52px] h-[58px] text-center text-xl font-bold rounded-xl border-[#A0DEBF] border-2 bg-surface-container-lowest focus:border-primary transition-all" maxlength="1" type="text"/>
<input class="otp-input w-[52px] h-[58px] text-center text-xl font-bold rounded-xl border-[#A0DEBF] border-2 bg-surface-container-lowest focus:border-primary transition-all" maxlength="1" type="text"/>
</div>
<!-- Primary Action -->
<button class="w-full h-[52px] rounded-[14px] bg-gradient-to-br from-primary to-primary-container text-white font-bold text-lg shadow-lg shadow-blue-200 active:scale-[0.98] transition-transform mb-6">
                Verify OTP
            </button>
<!-- Resend & Alternative Login -->
<div class="space-y-6 text-center">
<div class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[#FF9800] text-sm">schedule</span>
<p class="text-[#FF9800] text-sm font-semibold">Resend in 28s</p>
</div>
<div class="flex items-center justify-center gap-3 py-3 px-4 rounded-xl border-2 border-primary/10 hover:bg-primary/5 cursor-pointer transition-colors group">
<span class="material-symbols-outlined text-[#0077BE]" style="font-variation-settings: 'FILL' 0;">fingerprint</span>
<span class="text-[#0077BE] font-bold text-sm">Use Fingerprint / Face ID</span>
</div>
</div>
<!-- Security Footer -->
<div class="mt-10 pt-6 flex items-center justify-center gap-2 text-[#48BCAE]">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-xs font-semibold tracking-wide uppercase">Secure · OTP expires in 5 min</span>
</div>
<!-- Background Decorative Element (Subtle Water Ripple) -->
<div class="absolute -bottom-10 -right-10 w-40 h-40 bg-primary/5 rounded-full blur-3xl"></div>
</div>
<!-- Footer Editorial Text -->
<div class="mt-8 text-center px-6">
<p class="text-on-surface-variant/60 text-xs leading-relaxed">
                By continuing, you agree to Thannigo's <br/>
<span class="font-semibold text-on-surface-variant/80">Terms of Service</span> and <span class="font-semibold text-on-surface-variant/80">Privacy Policy</span>
</p>
</div>
</main>
<!-- Support Section (Asymmetric Editorial Style) -->
<div class="fixed bottom-8 right-8 hidden md:block">
<button class="flex items-center gap-2 bg-white px-5 py-3 rounded-full shadow-xl hover:shadow-2xl transition-all border border-outline-variant/10">
<span class="material-symbols-outlined text-secondary">help</span>
<span class="text-on-surface font-semibold text-sm">Need help?</span>
</button>
</div>
</body></html>
