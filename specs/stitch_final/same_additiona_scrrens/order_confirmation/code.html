<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Confirmed - Thannigo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#86f5e6",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#404751",
                        "secondary": "#006a61",
                        "inverse-on-surface": "#eff1f6",
                        "on-secondary-fixed-variant": "#005049",
                        "on-primary-container": "#f7f9ff",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f7f9ff",
                        "surface-container-low": "#f2f3f9",
                        "error": "#ba1a1a",
                        "primary-fixed": "#cfe5ff",
                        "surface-container-high": "#e6e8ee",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#002114",
                        "secondary-container": "#83f2e3",
                        "inverse-surface": "#2d3135",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#9acbff",
                        "outline-variant": "#c0c7d2",
                        "on-primary-fixed": "#001d34",
                        "tertiary-fixed": "#b1f0d0",
                        "tertiary": "#28654c",
                        "surface-tint": "#00629e",
                        "outline": "#707882",
                        "on-error": "#ffffff",
                        "surface-container": "#eceef3",
                        "on-tertiary-fixed-variant": "#105139",
                        "on-tertiary-container": "#e8fff0",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e0e2e8",
                        "secondary-fixed-dim": "#68d9ca",
                        "inverse-primary": "#9acbff",
                        "on-primary-fixed-variant": "#004a79",
                        "on-background": "#181c20",
                        "surface-dim": "#d8dadf",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#96d4b5",
                        "primary": "#005e97",
                        "on-surface": "#181c20",
                        "tertiary-container": "#437e64",
                        "surface-variant": "#e0e2e8",
                        "primary-container": "#0077be",
                        "on-secondary-fixed": "#00201c",
                        "on-secondary-container": "#006f65",
                        "surface-bright": "#f7f9ff",
                        "surface": "#f7f9ff",
                        "brand-success": "#48BCAE",
                        "brand-navy": "#1A2340",
                        "brand-gray": "#74777C",
                        "brand-border": "#E4EAF7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Epilogue"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"],
                        "mono": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-confetti {
            background-image: radial-gradient(circle at 20% 30%, #A0DEBF 2px, transparent 2px),
                              radial-gradient(circle at 80% 40%, #0077BE 3px, transparent 3px),
                              radial-gradient(circle at 40% 70%, #A0DEBF 2.5px, transparent 2.5px),
                              radial-gradient(circle at 70% 80%, #0077BE 2px, transparent 2px),
                              radial-gradient(circle at 10% 90%, #A0DEBF 3px, transparent 3px),
                              radial-gradient(circle at 90% 10%, #0077BE 2.5px, transparent 2.5px);
            background-size: 100% 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased max-w-[390px] mx-auto min-h-screen relative overflow-x-hidden">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_4px_24px_rgba(0,0,0,0.04)]">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button class="text-sky-700 hover:opacity-80 transition-opacity scale-95 active:duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline tracking-tight font-bold text-lg text-sky-700">Checkout</h1>
<div class="w-6"></div>
</div>
</header>
<main class="pt-20 pb-12 px-6">
<!-- Animation Area -->
<section class="flex flex-col items-center justify-center py-12 relative overflow-hidden bg-confetti">
<div class="relative flex items-center justify-center w-32 h-32 mb-6">
<!-- Outer Ring -->
<div class="absolute inset-0 rounded-full border-4 border-brand-success/30 animate-pulse"></div>
<!-- Inner Fill -->
<div class="w-24 h-24 rounded-full bg-primary-container flex items-center justify-center shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-white text-5xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<h2 class="text-brand-navy font-headline text-2xl font-bold mb-2">Order Confirmed! 🎉</h2>
<p class="text-brand-gray text-sm">Your hydration is on its way</p>
</section>
<!-- Order Info Card -->
<section class="bg-white rounded-2xl border border-brand-border shadow-[0_8px_30px_rgba(0,0,0,0.04)] p-6 mb-8">
<div class="flex justify-between items-start mb-4">
<div>
<span class="font-mono text-[12px] text-brand-gray block mb-1">Order #TH-2847</span>
<h3 class="text-brand-navy font-bold text-lg">Blue Spring Aquatics</h3>
</div>
<div class="bg-brand-success/10 text-brand-success px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap">
                    25-30 min
                </div>
</div>
<div class="flex items-center gap-4 mb-6">
<div class="w-12 h-12 rounded-xl bg-surface-container-low flex items-center justify-center overflow-hidden">
<img alt="Water Can" class="w-full h-full object-cover" data-alt="Close-up of a large 20L plastic mineral water bottle with fresh blue liquid inside and condensation on surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBf-YnSKuI3hESzOnhGyJgdQHmFoKoQNgoGMIo98RPPP59Q9B8ZqgARSKla0MsYFPF72J8vPqayGCzBHyqZQY2DCk0Sj1YgFR2WD3_T5yMC0dl6pCWzRGr7FrmIStBUxITtbRpHq7wD6AVZ6Fg7QhI90ugZGuhEf3Zl3WC0Pla2lpEb__j3Yu87xJuhdDjktAB5fDeNd09MyQYoFLN0W69KznB4NJ_sj7uKUwCsDthgX3K2Ywin8lipUJnZPqtdF0xnbqmR7tx5aa4"/>
</div>
<div class="flex-1">
<p class="text-brand-gray text-sm font-medium">2 × 20L Mineral Water Can</p>
<p class="text-primary-container font-bold text-lg">₹102</p>
</div>
</div>
<!-- Status Tracker -->
<div class="relative pt-2">
<div class="flex justify-between items-center relative z-10">
<!-- Step 1: Placed -->
<div class="flex flex-col items-center">
<div class="w-6 h-6 rounded-full bg-brand-success flex items-center justify-center text-white text-[14px]">
<span class="material-symbols-outlined text-sm" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-[10px] font-bold mt-2 text-brand-success">Placed</span>
</div>
<!-- Step 2: Accepted -->
<div class="flex flex-col items-center">
<div class="w-6 h-6 rounded-full bg-primary-container ring-4 ring-primary-container/20 flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-white"></div>
</div>
<span class="text-[10px] font-bold mt-2 text-brand-navy">Accepted</span>
</div>
<!-- Step 3: Preparing -->
<div class="flex flex-col items-center">
<div class="w-6 h-6 rounded-full border-2 border-brand-border bg-white"></div>
<span class="text-[10px] font-medium mt-2 text-brand-gray">Preparing</span>
</div>
<!-- Step 4: Way -->
<div class="flex flex-col items-center">
<div class="w-6 h-6 rounded-full border-2 border-brand-border bg-white"></div>
<span class="text-[10px] font-medium mt-2 text-brand-gray">On the Way</span>
</div>
<!-- Step 5: Delivered -->
<div class="flex flex-col items-center">
<div class="w-6 h-6 rounded-full border-2 border-brand-border bg-white"></div>
<span class="text-[10px] font-medium mt-2 text-brand-gray">Delivered</span>
</div>
</div>
<!-- Progress Line -->
<div class="absolute top-5 left-3 right-3 h-[2px] bg-brand-border -z-0">
<div class="h-full bg-primary-container w-[25%] rounded-full"></div>
</div>
</div>
</section>
<!-- Actions Row -->
<div class="grid grid-cols-1 gap-4 mb-8">
<button class="w-full h-[52px] bg-primary-container text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary-container/20 scale-98 transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
                Track Order
            </button>
<button class="w-full h-[52px] border-2 border-brand-success text-brand-success rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-brand-success/5 transition-colors">
<span class="material-symbols-outlined" data-icon="chat">chat</span>
                WhatsApp Shop
            </button>
</div>
<div class="flex justify-center">
<button class="text-brand-gray font-semibold text-sm hover:text-brand-navy transition-colors px-4 py-2">
                Back to Home
            </button>
</div>
</main>
<!-- Bottom Nav Bar (Suppressed due to transactional focus rule) -->
<!-- Exclusion rationale: transactional success screens prioritize the current focus -->
</body></html>
