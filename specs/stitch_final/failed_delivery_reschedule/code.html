<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#437e64",
                        "secondary-fixed": "#86f5e6",
                        "secondary": "#006a61",
                        "on-secondary": "#ffffff",
                        "outline": "#707882",
                        "surface-container-low": "#f2f3f9",
                        "primary-fixed": "#cfe5ff",
                        "on-secondary-container": "#006f65",
                        "surface": "#f7f9ff",
                        "inverse-on-surface": "#eff1f6",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e0e2e8",
                        "on-surface-variant": "#404751",
                        "on-tertiary-container": "#e8fff0",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#005049",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f7f9ff",
                        "surface-dim": "#d8dadf",
                        "on-surface": "#181c20",
                        "primary-container": "#0077be",
                        "primary": "#005e97",
                        "inverse-surface": "#2d3135",
                        "surface-container": "#eceef3",
                        "background": "#f7f9ff",
                        "outline-variant": "#c0c7d2",
                        "surface-tint": "#00629e",
                        "on-tertiary-fixed": "#002114",
                        "surface-container-high": "#e6e8ee",
                        "on-primary-fixed-variant": "#004a79",
                        "on-primary-container": "#f7f9ff",
                        "secondary-container": "#83f2e3",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#001d34",
                        "primary-fixed-dim": "#9acbff",
                        "on-secondary-fixed": "#00201c",
                        "tertiary-fixed": "#b1f0d0",
                        "inverse-primary": "#9acbff",
                        "tertiary": "#28654c",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#105139",
                        "tertiary-fixed-dim": "#96d4b5",
                        "surface-variant": "#e0e2e8",
                        "error-container": "#ffdad6",
                        "on-background": "#181c20",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#68d9ca",
                        "thannigo-red": "#FF5252",
                        "thannigo-light-red": "#FFF0F0",
                        "thannigo-navy": "#1A2340"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center">
<!-- Mobile Container (390x844px Simulator) -->
<main class="w-[390px] h-[844px] bg-slate-200 relative overflow-hidden shadow-2xl flex flex-col">
<!-- Background Map Layer (Context for Delivery) -->
<div class="absolute inset-0 z-0">
<img alt="abstract minimalist street map with primary blue accents and clean navigational lines" class="w-full h-full object-cover grayscale opacity-50" data-location="Singapore" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-QP37We3gSGgzmhrg8c0qt8CKvdAYUebTs602fgMoxZwNWRL1_e1WpwxVfFN63RdGpK2J3BSle5W3s2EvuQOvGFBWM_zbUL6Zuz_qw3S-_1u2dl05BxyB8prR-0beZMj37imAKqKVdiZ6WJfXlVcdQXlW7EG0Qs9jvWnaXfXSOjmG-wSJPivnAXHaaPKWDqIVzV7HVnEt1OCsK5E_IcjSQu4gpxmkhUNaQYbsiMAqbzYQ1Ns18fyEOSXrmD1r_0tyX8BgnywIaPTq"/>
</div>
<!-- Shared Component: TopAppBar -->
<header class="bg-white/70 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center w-full px-6 py-3 shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900" data-icon="menu">menu</span>
<h1 class="text-xl font-extrabold tracking-tight text-slate-900">Thannigo</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary-container">
<img alt="delivery person professional profile headshot with friendly expression" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDQkOs0HFNFqQVMmedMkaWoK66iO9fSI3gsT9_PvJ6r638ndikQbobX3of49QNwZkAIhGRELBNsvKVyzxzb2qBFoYJ82u4oLTsUpUxVqe8O4CmKDIMkerWbgfb-VzISHnliaIZu6gzseUkEngCnfcrhtsRDyc7H_rPYggouaRinEJ_IQCsW-ou-SR7Uhab5Cg07SgV-tej_HhJDEVvs6flxWtWLzRWG7BZPxculqG_QLr_RTCYa3FZ9up5MLVTRZZB041zgcWr_bjD"/>
</div>
</header>
<!-- Overlay for Modal Context -->
<div class="absolute inset-0 bg-thannigo-navy/30 z-10"></div>
<!-- Bottom Sheet (The Core Task) -->
<section class="absolute bottom-0 left-0 w-full h-[85%] bg-white rounded-t-[24px] z-20 flex flex-col shadow-[0_-8px_40px_rgba(0,0,0,0.12)]">
<!-- Handle & Header -->
<div class="flex flex-col items-center pt-3 pb-5">
<div class="w-12 h-1 bg-outline-variant/40 rounded-full mb-6"></div>
<div class="flex items-center gap-2 text-thannigo-red">
<span class="material-symbols-outlined text-[20px]" data-icon="report" style="font-variation-settings: 'FILL' 1;">report</span>
<h2 class="text-[18px] font-bold">⚠ Mark Delivery Failed</h2>
</div>
</div>
<!-- Content Container -->
<div class="flex-1 overflow-y-auto px-6 pb-24 space-y-8">
<!-- Reason Selection -->
<div>
<h3 class="text-thannigo-navy text-sm font-bold mb-4 uppercase tracking-wider">Why couldn't you deliver?</h3>
<div class="flex flex-wrap gap-2">
<!-- Selected Chip -->
<button class="bg-thannigo-light-red border-2 border-thannigo-red text-thannigo-red px-4 py-2 rounded-full text-xs font-bold transition-all active:scale-95">
                            Customer not available
                        </button>
<!-- Inactive Chips -->
<button class="bg-surface-container-low border border-transparent text-on-surface-variant px-4 py-2 rounded-full text-xs font-semibold hover:bg-surface-container-highest transition-all active:scale-95">
                            Wrong address
                        </button>
<button class="bg-surface-container-low border border-transparent text-on-surface-variant px-4 py-2 rounded-full text-xs font-semibold hover:bg-surface-container-highest transition-all active:scale-95">
                            Gate locked
                        </button>
<button class="bg-surface-container-low border border-transparent text-on-surface-variant px-4 py-2 rounded-full text-xs font-semibold hover:bg-surface-container-highest transition-all active:scale-95">
                            Customer refused
                        </button>
<button class="bg-surface-container-low border border-transparent text-on-surface-variant px-4 py-2 rounded-full text-xs font-semibold hover:bg-surface-container-highest transition-all active:scale-95">
                            Other
                        </button>
</div>
</div>
<!-- Proof Capture -->
<div class="space-y-4">
<h3 class="text-thannigo-navy text-sm font-bold uppercase tracking-wider">Proof Capture</h3>
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center border-2 border-dashed border-outline-variant rounded-2xl h-32 bg-surface text-primary-container hover:bg-primary-fixed/20 transition-colors group">
<span class="material-symbols-outlined text-3xl mb-2 group-active:scale-90 transition-transform" data-icon="photo_camera">photo_camera</span>
<span class="text-xs font-bold">Capture proof</span>
<span class="text-[10px] text-outline opacity-70">(Optional)</span>
</button>
<div class="relative h-32 rounded-2xl overflow-hidden shadow-sm group">
<img alt="proof of delivery photo showing locked gate with delivery package in foreground" class="w-full h-full object-cover brightness-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAoRCkrIgXBqU45cCVB_R5AY_Basti34WHJ6fIs88gTCQTyHRNIAA8sGKf8_6cT08JlszZQcFIET57lHa9NcY_UtaaDngBr47CL-zvcWzCfLewPG7l2pkfJFt6dKJwD3HUtXHu45Unf-n_yz_MUAQ8RUcSA8EqPbEIthuwfbursfSTjwrKwNWkjYQPQaufOd4Sp63rQOQdjcxp10NM_ynZrEh8tpWRkj_nDDTFStzcQP1ORJeGnIixSh7D5YYjBPXGFduN1PgnPpc2s"/>
<div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white" data-icon="visibility">visibility</span>
</div>
<button class="absolute top-2 right-2 bg-thannigo-red text-white p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined text-[14px]" data-icon="close">close</span>
</button>
</div>
</div>
</div>
<!-- Reschedule Options -->
<div class="space-y-4">
<h3 class="text-thannigo-navy text-sm font-bold uppercase tracking-wider">Reschedule Options</h3>
<div class="space-y-3">
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/30 rounded-2xl hover:border-primary-container transition-all cursor-pointer group">
<div class="flex items-center gap-3">
<div class="w-5 h-5 rounded-full border-2 border-primary-container flex items-center justify-center">
<div class="w-2.5 h-2.5 bg-primary-container rounded-full"></div>
</div>
<span class="text-sm font-semibold text-on-surface">Reschedule for customer to choose</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="calendar_today">calendar_today</span>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/30 rounded-2xl hover:border-primary-container transition-all cursor-pointer group">
<div class="flex items-center gap-3">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant"></div>
<span class="text-sm font-semibold text-on-surface">Customer to pick up from shop</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="storefront">storefront</span>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/30 rounded-2xl hover:border-primary-container transition-all cursor-pointer group">
<div class="flex items-center gap-3">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant"></div>
<span class="text-sm font-semibold text-on-surface">Cancel and refund</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="undo">undo</span>
</label>
</div>
</div>
</div>
<!-- Sticky Bottom Action -->
<div class="absolute bottom-0 left-0 w-full p-6 bg-white/90 backdrop-blur-md flex flex-col gap-3">
<button class="w-full h-[52px] bg-thannigo-red text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-[0_8px_20px_rgba(255,82,82,0.3)] active:scale-95 transition-all">
<span>Mark as Failed &amp; Notify Customer</span>
<span class="material-symbols-outlined text-[18px]" data-icon="send">send</span>
</button>
</div>
</section>
<!-- Hidden Shared Component (Suppressed per "Task-Focused" rule, but structure maintained for context) -->
<nav class="hidden">
<!-- BottomNavBar logic says suppress for focused journeys -->
</nav>
</main>
</body></html>
