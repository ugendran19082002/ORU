<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f7f9ff]/80 backdrop-blur-md flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center hover:opacity-80 transition-opacity active:scale-90 duration-200">
<span class="material-symbols-outlined text-[#0077BE]">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_SANS'] font-bold tracking-tight text-on-surface text-xl">Report an Issue</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center hover:opacity-80 transition-opacity active:scale-90 duration-200">
<span class="material-symbols-outlined text-[#0077BE]">call</span>
</button>
</header>
<main class="pt-20 pb-24 px-5 max-w-[390px] mx-auto min-h-screen">
<!-- Order Context Tonal Layering -->
<section class="mb-8 p-6 rounded-xl bg-surface-container-low">
<div class="flex items-center justify-between mb-4">
<span class="text-on-surface-variant text-sm font-medium">Order ID: #TN-94021</span>
<span class="px-3 py-1 rounded-full bg-secondary-fixed text-on-secondary-fixed-variant text-[11px] font-bold uppercase tracking-wider">Delivered</span>
</div>
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-lg bg-surface-container-lowest overflow-hidden">
<img class="w-full h-full object-cover" data-alt="a clear glass mineral water bottle standing on a modern marble countertop with soft morning sunlight reflections" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzU_eJWrmsBk5pU6IbGWrLW0hkgmo0lgOX56jGQPJXZfF3F2PX5VWjXe0lAm6pLIkg0n6Xe63plhoxGrtCDjp6q01vR4IvYOyUwlnXLqa70X18VQQbe_eI7PlOdO6UjC50gPdgDCMMlCM1p1G1QHtkYRSXE2ZUx1tTIU01aeF0wAmfkhIGVqnQqmjTAII6uDgi8aWods8zjnNaO7JWOznFc-nj7P7GTxn96U8CrmPkcglMWUlENRkvAxS62acu8mqlvaroC7iDEKY"/>
</div>
<div>
<p class="font-headline font-bold text-on-surface">Premium Spring Water</p>
<p class="text-sm text-on-surface-variant">20L Canister x 2</p>
</div>
</div>
</section>
<!-- Complaint Type Selector (Bento Style) -->
<section class="mb-8">
<h2 class="font-headline font-bold text-lg mb-4 ml-1">What went wrong?</h2>
<div class="grid grid-cols-2 gap-3">
<button class="p-4 rounded-xl bg-surface-container-lowest border-2 border-primary ring-1 ring-primary/20 flex flex-col items-start gap-2 transition-all duration-200">
<span class="material-symbols-outlined text-primary">schedule</span>
<span class="text-sm font-semibold">Delivery was late</span>
</button>
<button class="p-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-outline-variant/30 flex flex-col items-start gap-2 transition-all duration-200">
<span class="material-symbols-outlined text-outline">shopping_basket</span>
<span class="text-sm font-semibold">Wrong items</span>
</button>
<button class="p-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-outline-variant/30 flex flex-col items-start gap-2 transition-all duration-200">
<span class="material-symbols-outlined text-outline">opacity</span>
<span class="text-sm font-semibold">Water quality</span>
</button>
<button class="p-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-outline-variant/30 flex flex-col items-start gap-2 transition-all duration-200">
<span class="material-symbols-outlined text-outline">water_drop</span>
<span class="text-sm font-semibold">Leaking can</span>
</button>
</div>
</section>
<!-- Resolution Preference -->
<section class="mb-8">
<h2 class="font-headline font-bold text-lg mb-4 ml-1">Resolution Preference</h2>
<div class="space-y-3">
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl cursor-pointer active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">published_with_changes</span>
<span class="font-medium text-on-surface">Replacement</span>
</div>
<input class="w-5 h-5 text-primary border-outline focus:ring-primary" name="resolution" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl cursor-pointer active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">payments</span>
<span class="font-medium text-on-surface">Refund</span>
</div>
<input class="w-5 h-5 text-primary border-outline focus:ring-primary" name="resolution" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl cursor-pointer active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">note_add</span>
<span class="font-medium text-on-surface">Note</span>
</div>
<input class="w-5 h-5 text-primary border-outline focus:ring-primary" name="resolution" type="radio"/>
</label>
</div>
</section>
<!-- Evidence Section -->
<section class="mb-8">
<h2 class="font-headline font-bold text-lg mb-4 ml-1">Evidence &amp; Details</h2>
<div class="bg-surface-container-lowest rounded-xl p-4">
<div class="flex gap-3 mb-4 overflow-x-auto hide-scrollbar">
<button class="shrink-0 w-24 h-24 rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-1 text-outline hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined">add_a_photo</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Add Photo</span>
</button>
<!-- Mock existing photo -->
<div class="shrink-0 w-24 h-24 rounded-xl bg-surface-container-low overflow-hidden relative group">
<img class="w-full h-full object-cover" data-alt="close up of a modern grocery bag and delivery receipt on a light blue wooden background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxSMU7aLmPIMC_RLG17BdoaWhq0Of2Qa8TD1zCacb7RNxspdQlKWi9mf0Q1q8t_mSz5yGpsErIikKs_Z96zPVDQH8-E8Q2ddKvHMTBeMQwsZjUflPa8vn97r4_hVgCnCWBo9y3yUNpw8kt0TbIG1h5mGVDUhbJUO5FfUrl_fjGr1ciCv3eO9uyV3W2PvCFHZjMLtrKnHvwLKtaJT7VcSs-lwMpyX6JwGxrFhWpfhnnn047_RAhrbGTPrh8rs_s5tk5HPHWWIrqo1U"/>
<button class="absolute top-1 right-1 w-6 h-6 bg-error/90 text-white rounded-full flex items-center justify-center scale-0 group-hover:scale-100 transition-transform">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>
<textarea class="w-full bg-surface-container-high border-none rounded-xl p-4 text-on-surface placeholder:text-outline text-sm focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all min-h-[120px]" placeholder="Tell us more about the issue..."></textarea>
</div>
</section>
<!-- Submit Button -->
<div class="fixed bottom-0 left-0 w-full p-5 bg-surface/80 backdrop-blur-md z-40">
<button class="w-full h-[52px] rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold shadow-lg active:scale-95 duration-200 transition-all flex items-center justify-center gap-2">
<span>Submit Complaint</span>
<span class="material-symbols-outlined text-lg" data-weight="fill">send</span>
</button>
</div>
</main>
<!-- Navigation Shell Hidden for Transactional Flow as per rules -->
<nav class="hidden fixed bottom-0 w-full rounded-t-xl z-50 bg-[#f7f9ff]/80 backdrop-blur-md flex justify-around items-center h-20 pb-4 px-2 shadow-[0_-12px_32px_rgba(24,28,32,0.06)] border-t-[0.5px] border-slate-200/20">
<a class="flex flex-col items-center justify-center text-[#181c20] opacity-60" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-['Inter'] text-[12px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#181c20] opacity-60" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-['Inter'] text-[12px] font-medium">Search</span>
</a>
<!-- Active based on flow: Orders -->
<a class="flex flex-col items-center justify-center text-[#0077BE] font-bold bg-[#ffffff] rounded-xl px-4 py-1 scale-110 duration-300 ease-in-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-['Inter'] text-[12px] font-medium">Orders</span>
</a>
<a class="flex flex-col items-center justify-center text-[#181c20] opacity-60" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Inter'] text-[12px] font-medium">Wallet</span>
</a>
<a class="flex flex-col items-center justify-center text-[#181c20] opacity-60" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[12px] font-medium">Profile</span>
</a>
</nav>
</body></html>
