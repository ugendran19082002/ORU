# =============================================================================
# thannigo.openspec.yaml
# Thannigo Water Delivery App — Complete Frontend Specification
# Version: 2.0 | Updated: 2026-04-10
# Total Features: 366 | Screens: 24+ | Roles: Customer / Shop / Delivery
# =============================================================================

project:
  name: Thannigo Water Delivery App
  type: Mobile App (Expo React Native)
  version: "2.0"
  last_updated: "2026-04-10"
  description: >
    Complete frontend specification for Thannigo — a water can delivery platform
    serving customers in Bangalore/Chennai. Includes Customer App, Shop Admin UI,
    and Delivery Person UI. All 366 features across P0/P1/P2 priorities.

stitch_engine:
  enabled: true
  source_folder: "specs/stitch_final"

  auto_import: true
  remove_duplicates: true

  selection_rules:
    - prefer: "latest"
    - prefer: "complete_ui"
    - prefer: "with_filters"

  mapping:
    home: "customer_home"
    search: "search_screen"
    shop: "shop_detail"
    checkout: "checkout"
    tracking: "tracking"
    dashboard: "shop_dashboard"
    orders: "shop_orders"
    inventory: "inventory"

  fallback:
    use_default_ui: true
# =============================================================================
# COLOR SYSTEM
# =============================================================================
color_system:
  brand: Thannigo Aquatic Flow
  palette:
    primary: "#0077B6" # Buttons, headers, active states, CTAs
    secondary: "#48CAE4" # Highlights, chips, icon tints
    tertiary: "#ADEBF4" # Backgrounds, card borders, inactive
    neutral: "#74777C" # Body text, placeholders, timestamps
    accent: "#0096C7" # Mid-blue accent
    background: "#F5F9FF" # App background
    surface: "#FFFFFF" # Cards, sheets
    dark_text: "#1A1A2E" # Primary text
    # Role colors
    customer_blue: "#1565C0" # Customer app accent
    shop_purple: "#6A1B9A" # Shop app accent
    both_teal: "#00695C" # Shared feature accent
    # Priority colors
    p0_red: "#C0392B" # P0 Critical / errors
    p1_orange: "#E67E22" # P1 Important / warnings
    p2_green: "#27AE60" # P2 Future / success / delivered
    # Semantic
    success: "#27AE60"
    warning: "#E67E22"
    error: "#C0392B"
    open_badge: "#27AE60"
    closed_badge: "#C0392B"
    star: "#F59E0B"
    whatsapp: "#25D366"

  typography:
    font_family: "Inter"
    fallback: "SF Pro (iOS), Roboto (Android)"
    scale:
      display: { size: 32, weight: 700 }
      heading_1: { size: 24, weight: 700 }
      heading_2: { size: 20, weight: 600 }
      heading_3: { size: 18, weight: 600 }
      body_lg: { size: 16, weight: 400 }
      body_md: { size: 14, weight: 400 }
      caption: { size: 12, weight: 400 }
      micro: { size: 11, weight: 400 }

  spacing:
    base: 8
    scale: [4, 8, 12, 16, 20, 24, 32, 40, 48, 56, 64]

  radius:
    sm: 8
    md: 12
    lg: 16
    xl: 20
    pill: 24
    full: 9999

  shadows:
    card: "0 2px 8px rgba(0,0,0,0.08)"
    modal: "0 8px 32px rgba(0,0,0,0.16)"
    fab: "0 4px 16px rgba(0,119,182,0.30)"

# =============================================================================
# TECH STACK
# =============================================================================
tech_stack:
  framework: "Expo Router + Expo React Native"
  language: "TypeScript (strict)"
  sdk: "Expo SDK 54"
  navigation: "Expo Router v6 file-based routing with Stack + Tabs"
  state:
    global: "Zustand"
    local: "React hooks (useState, useReducer)"
    server: "React Query (mock)"
  maps:
    primary: "react-native-maps"
    web: "Leaflet (react-leaflet)"
  ui_lib: "Custom component library (no external UI lib)"
  icons: "react-native-vector-icons (MaterialIcons)"
  animations: "React Native Animated API + Reanimated 3"
  storage: "AsyncStorage (auth tokens, preferences)"
  notifications: "Expo Notifications"
  camera: "Expo Camera (delivery proof)"
  location: "Expo Location"
  haptics: "Expo Haptics"
  biometrics: "Expo LocalAuthentication"

# =============================================================================
# FOLDER STRUCTURE
# =============================================================================
folder_structure:
  src/:
    app/: "Entry point, navigation root"
    screens/:
      auth/: "Splash, Onboarding, Login, OTP"
      customer/: "Home, Search, ShopDetail, Cart, Checkout, Tracking, History, Wallet, Profile"
      shop/: "Dashboard, OrderList, OrderDetail, Inventory, Earnings, Customers, Analytics, Settings"
      delivery/: "AssignedOrders, Navigation, OTPVerify, DeliveryComplete"
      shared/: "Notifications, Settings, Language, Help"
    components/:
      ui/: "Button, Card, Badge, Chip, Input, Modal, BottomSheet, Avatar, Rating, Skeleton"
      layout/: "Screen, Header, BottomNav, TabBar, SafeArea"
      order/: "OrderCard, OrderStatusTimeline, OrderSummary"
      shop/: "ShopCard, ProductCard, StockCard"
      maps/: "MapView, DeliveryPin, RoutePolyline"
      forms/: "AddressForm, PaymentForm, ReviewForm"
    hooks/:
      useAuth.ts: "Authentication state"
      useOrders.ts: "Order CRUD operations"
      useCart.ts: "Cart state management"
      useInventory.ts: "Stock operations"
      useLocation.ts: "GPS and address"
      useNotifications.ts: "Push notification handling"
      useAppState.ts: "Global app state"
    stores/:
      authStore.ts: "Zustand - user session"
      cartStore.ts: "Zustand - cart items"
      orderStore.ts: "Zustand - orders"
      shopStore.ts: "Zustand - shop data"
      appStore.ts: "Zustand - theme, language"
    utils/:
      mockData.ts: "All mock JSON data"
      # mockApi.ts: "Simulated API with delays"
      formatters.ts: "Currency, date, phone formatters"
      validators.ts: "Form validation"
      constants.ts: "App constants"
      theme.ts: "Complete color + typography system"
    types/:
      user.types.ts: "User, Customer, ShopOwner, DeliveryPerson"
      order.types.ts: "Order, OrderItem, OrderStatus"
      product.types.ts: "Product, Variant, Price"
      shop.types.ts: "Shop, Rating, WorkingHours"
      payment.types.ts: "Payment, Transaction, Wallet"
    navigation/:
      AppNavigator.tsx: "Root navigator"
      AuthNavigator.tsx: "Auth stack"
      CustomerNavigator.tsx: "Customer tabs + stacks"
      ShopNavigator.tsx: "Shop tabs + stacks"
      DeliveryNavigator.tsx: "Delivery stack"
    constants/:
      colors.ts: "Complete color tokens"
      typography.ts: "Font scale"
      spacing.ts: "8px grid"
    spec/: "This spec file + design references"
    workflow_features/: "Design docs, feature list, workflow MD"

# =============================================================================
# NAVIGATION STRUCTURE
# =============================================================================
navigation:
  root:
    type: expo_router_stack
    entry_layout: "app/_layout.tsx"
    initial: auth
    route_groups:
      - name: auth
        path: /auth
        layout: "app/auth/_layout.tsx"
      - name: customer_app
        path: /(tabs)
        layout: "app/(tabs)/_layout.tsx"
        condition: "user.role === 'customer'"
      - name: shop_app
        path: /shop
        layout: "app/shop/_layout.tsx"
        condition: "user.role === 'shop_owner' || user.role === 'staff'"
      - name: admin_app
        path: /admin
        layout: "app/admin/_layout.tsx"
        condition: "user.role === 'admin'"
      - name: shared_stack_routes
        paths:
          - /order/[id]
          - /order/checkout
          - /order/tracking
          - /order/rating
          - /addresses
          - /edit-profile
          - /location
          - /map-preview
          - /modal

  auth_stack:
    type: expo_router_stack
    screens:
      - name: Splash
        route: /auth
        component: WelcomeScreen
        options: { headerShown: false, animation: fade }
      - name: Onboarding
        route: /auth/role
        component: RoleSelectScreen
        options: { headerShown: false, gestureEnabled: false }
      - name: PhoneLogin
        route: /auth/login
        component: LoginScreen
        options: { headerShown: false }
      - name: OTPVerification
        route: /auth/otp
        component: OTPScreen
        options: { headerShown: false }

  customer_tabs:
    type: expo_router_tabs
    layout: "app/(tabs)/_layout.tsx"
    tab_bar_color: "#FFFFFF"
    active_tint: "#005d90"
    inactive_tint: "#74777C"
    tabs:
      - name: Home
        icon: home
        route: /(tabs)
        component: HomeScreen
        badge: null
      - name: Orders
        icon: receipt-long
        route: /(tabs)/orders
        component: OrdersScreen
        badge: "active_orders_count"
      - name: Wallet
        icon: account-balance-wallet
        route: /(tabs)/wallet
        component: WalletScreen
        badge: null
      - name: Profile
        icon: person
        route: /(tabs)/profile
        component: ProfileScreen
        badge: null
    stacks:
      home_stack:
        - /(tabs)
        - /order/[id]
        - /order/checkout
        - /order/tracking
        - /order/rating
      orders_stack:
        - /(tabs)/orders
        - /order/[id]
        - /order/tracking
        - /order/rating
      profile_stack:
        - /(tabs)/profile
        - /edit-profile
        - /addresses

  shop_tabs:
    type: expo_router_tabs
    layout: "app/shop/_layout.tsx"
    tab_bar_color: "#FFFFFF"
    active_tint: "#006878"
    inactive_tint: "#74777C"
    tabs:
      - name: Orders
        icon: list-alt
        route: /shop
        component: ShopOrdersScreen
        badge: "new_orders_count"
      - name: Customers
        icon: people
        route: /shop/customers
        component: CustomerManagementScreen
        badge: null
      - name: Earnings
        icon: bar-chart
        route: /shop/earnings
        component: EarningsScreen
        badge: null
      - name: Profile
        icon: storefront
        route: /shop/profile
        component: ShopProfileScreen
        badge: null
      - name: Settings
        icon: settings
        route: /shop/settings
        component: ShopSettingsScreen
        badge: null
      - name: Stock
        icon: inventory
        route: /shop/inventory
        component: InventoryScreen
        badge: "low_stock_alert"
    stacks:
      orders_stack:
        - /shop
        - /shop/order/[id]
      inventory_stack:
        - /shop/inventory
      customers_stack:
        - /shop/customers
      earnings_stack:
        - /shop/earnings
      settings_stack:
        - /shop/settings
        - /shop/profile

  delivery_stack:
    type: planned_stack
    screens:
      - AssignedOrders
      - DeliveryNavigation
      - OTPConfirmation
      - DeliveryComplete
      - DeliveryHistory

