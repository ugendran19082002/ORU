# =============================================================================
# AGENTS
# =============================================================================
agents:
  - name: frontend_agent
    role: "Senior React Native Developer"
    model: "GPT-5.4 High"
    tasks:
      - Read all design files from workflow_features/ folder
      - Create all 24+ screens from spec
      - Build reusable UI component library
      - Implement navigation (stack + bottom tabs)
      - Connect all mock data
      - Implement Zustand global state
      - Add loading skeletons and error states
      - Ensure all P0 features are implemented first
      - Wire up all CRITICAL features with red priority

  - name: ui_agent
    role: "UI/UX Engineer"
    model: "GPT-5.4 High"
    tasks:
      - Apply Thannigo color system exactly (see color_system section)
      - Ensure 8px spacing grid throughout
      - Implement all animations (shimmer, pulse, success checkmark)
      - Pixel-perfect implementation of all components
      - Smooth tab transitions
      - Haptic feedback on key actions (order placed, OTP verified)

# =============================================================================
# BUILD STEPS
# =============================================================================
steps:
  phase_1_mvp:
    description: "All P0 screens — must ship before launch"
    order:
      1: setup_project_structure
      2: implement_color_system_and_theme
      3: build_base_ui_components
      4: auth_screens (Splash, Onboarding, Login, OTP)
      5: customer_home_screen
      6: shop_detail_and_order_placement
      7: payment_and_confirmation
      8: order_tracking
      9: report_issue
      10: shop_dashboard
      11: shop_order_detail
      12: inventory_management
      13: earnings_and_eod
      14: delivery_screens
      15: connect_mock_data_all_screens
      16: implement_global_state
      17: test_all_p0_flows

  phase_2_important:
    description: "P1 features — adds stickiness"
    order:
      1: order_history_and_rating
      2: subscriptions
      3: wallet_and_payment_history
      4: referral_and_loyalty
      5: customer_management_shop
      6: analytics_screen
      7: promotions_and_coupons
      8: delivery_management
      9: settings_and_language
      10: notifications_center

  phase_3_future:
    description: "P2 advanced features"
    order:
      1: real_time_gps_tracking
      2: ai_smart_predictions
      3: in_app_chat
      4: dark_mode
      5: multi_branch_admin
      6: voice_search
      7: offline_mode

# =============================================================================
# CONSTRAINTS
# =============================================================================
constraints:
  performance:
    max_render_time: 1s
    list_virtual_threshold: 20_items
    image_lazy_load: true
    memo_heavy_components: true

  usability:
    max_taps_to_order: 3
    min_touch_target: 44px
    accessibility_contrast: "4.5:1 minimum"

  ui_quality:
    pixel_perfect: true
    smooth_animations: true
    skeleton_loaders: all_list_screens
    empty_states: all_list_screens
    error_boundaries: all_screens

  code_quality:
    typescript_strict: true
    no_any_types: true
    functional_components_only: true
    custom_hooks_for_logic: true
    no_inline_styles: true

# =============================================================================
# LOGGING
# =============================================================================
logging:
  - ui_errors
  - navigation_logs
  # - api_mock_calls
  - state_mutations
  - performance_metrics
  - p0_feature_coverage
