# =============================================================================
# SCREENS — AUTH
# =============================================================================
screens:
  auth:
    splash:
      id: SplashScreen
      route: /splash
      role: all
      priority: P0
      components:
        - FullBleedGradient: { from: "#0077B6", to: "#48CAE4" }
        - WaterDropIcon: { size: 64, color: "#FFFFFF" }
        - AppLogo: { text: "Thannigo", color: "#FFFFFF", size: 28, weight: 700 }
        - Tagline:
            { text: "Pure Water. Delivered Fast.", color: "#ADEBF4", size: 14 }
        - LoadingDots: { color: "#FFFFFF", animated: true }
      behavior:
        auto_navigate: 2s
        destination: onboarding_or_home
        check_auth_token: true

    onboarding:
      id: OnboardingScreen
      route: /onboarding
      role: customer | shop
      priority: P0
      slides:
        - title: "Order in 30 Seconds"
          body: "Browse 50+ local water shops"
          illustration: delivery_person_bike
        - title: "50+ Shops Near You"
          body: "Find verified water suppliers"
          illustration: map_with_pins
        - title: "Track Every Drop"
          body: "Real-time updates at every step"
          illustration: notification_delivered
      components:
        - PaginationDots: { active: "#0077B6", inactive: "#ADEBF4" }
        - SkipButton: { position: top_right, color: "#74777C" }
        - NextButton: { color: "#0077B6", height: 52, radius: 12 }
        - GetStartedButton: { on_last_slide: true }
      stored_flag: onboarding_completed

    phone_login:
      id: PhoneLoginScreen
      route: /login
      role: customer | shop | delivery
      priority: P0
      components:
        - PhoneInputRow:
            prefix: "+91"
            prefix_bg: "#E8F4FD"
            border_color: "#ADEBF4"
            active_border: "#0077B6"
        - SendOTPButton:
            color: "#0077B6"
            height: 52
            radius: 12
            disabled_until: valid_10_digit_phone
        - TermsText: { size: 12, color: "#74777C" }
      role_detection: by_phone_number_lookup

    otp_verification:
      id: OTPVerificationScreen
      route: /otp
      role: all
      priority: P0
      components:
        - OTPBoxes:
            count: 6
            box_size: 48
            gap: 8
            normal_border: "#ADEBF4"
            active_border: "#0077B6"
            filled_bg: "#E8F4FD"
        - ResendTimer:
            initial: 30
            color: "#48CAE4"
            resend_link_color: "#0077B6"
        - VerifyButton:
            color: "#0077B6"
            height: 52
            disabled_until: all_6_filled
      biometric_followup: true

  # =============================================================================
  # SCREENS — CUSTOMER APP
  # =============================================================================
  customer:
    customer_home:
      id: CustomerHomeScreen
      route: /customer/home
      role: customer
      priority: P0
      sections:
        header:
          - AppLogo: "#0077B6"
          - NotificationBell: { badge: true, badge_color: "#C0392B" }
          - CartIcon: { color: "#0077B6" }
        location_bar:
          bg: "#E8F4FD"
          items:
            - LocationPin: { color: "#0077B6" }
            - LocationText: { bold: true, size: 14 }
            - ChevronDown: { size: 12 }
        reminder_banner:
          condition: water_running_low
          bg: "#E3F2FD"
          border: "#48CAE4"
          items:
            - ReorderCTA: { color: "#0077B6", pill: true }
          priority: CRITICAL
        reorder_quick_card:
          condition: previous_order_exists
          items:
            - LastOrderSummary
            - ReorderButton: { color: "#0077B6" }
          priority: CRITICAL
        search_bar:
          bg: "#FFFFFF"
          border: "#ADEBF4"
          active_border: "#0077B6"
          radius: 24
          items:
            - SearchIcon
            - FilterIcon: { color: "#0077B6" }
        filter_chips:
          scroll: horizontal
          options: [All, Open Now, Nearest, Top Rated, "Price: Low"]
          active: { bg: "#0077B6", text: "#FFFFFF" }
          inactive: { border: "#ADEBF4", text: "#74777C" }
        view_toggle:
          options: [List, Map]
          active: { bg: "#0077B6", text: "#FFFFFF" }
        shop_cards:
          each:
            bg: "#FFFFFF"
            radius: 12
            shadow: card
            items:
              - ShopThumbnail: { size: 64, radius: 8 }
              - OpenClosedBadge:
                  open: { bg: "#E8F5E9", text: "#27AE60", label: "OPEN" }
                  closed: { bg: "#FFEBEE", text: "#C0392B", label: "CLOSED" }
                  priority: CRITICAL
              - ShopName: { size: 15, weight: 600 }
              - StarRating: { filled: "#F59E0B", size: 12 }
              - InfoRow: [delivery_time, distance, price_per_can]
              - TagPills: { bg: "#E8F4FD", text: "#0077B6" }
              - VerifiedBadge: { bg: "#48CAE4", text: "#0077B6" }
        bottom_nav: customer_tabs
      loading: skeleton_shimmer

    shop_detail:
      id: ShopDetailScreen
      route: /customer/shop/:id
      role: customer
      priority: P0
      sections:
        hero:
          height: 220
          gradient_overlay: "rgba(0,0,0,0.5) bottom 40%"
          items:
            - BackButton: { style: circle_white }
            - ShareButton: { style: circle_white }
            - FavoriteButton: { style: circle_white }
            - ShopName: { color: "#FFFFFF", size: 22, weight: 700 }
            - ShopMeta: [stars, reviews, distance, eta]
        shop_info:
          - OpenStatus: { open: "#27AE60", closed: "#C0392B" }
          - CertificationPills: { bg: "#ADEBF4", text: "#0077B6" }
          - QualityCertBadge: { color: "#27AE60" }
        product_cards:
          each:
            - ProductIllustration: { size: 48 }
            - ProductName: { size: 15, weight: 600 }
            - ProductDescription: { size: 12, color: "#74777C" }
            - AvailabilityBadge:
                in_stock: { text: "#27AE60", label: "IN STOCK" }
                out_of_stock: { text: "#95A5A6", label: "OUT OF STOCK" }
                priority: CRITICAL
            - Price: { size: 18, weight: 700, color: "#C0392B" }
            - QuantityStepper:
                minus: { border: "#ADEBF4", radius: "full" }
                count: { size: 18, weight: 600 }
                plus: { bg: "#0077B6", radius: "full" }
                min: 1
                max: 50
        delivery_options:
          toggle: [Instant ASAP, Schedule]
          schedule:
            - DateChips: { active: "#0077B6" }
            - TimeSlotChips: [Morning 7-11, Afternoon 11-3, Evening 3-8]
        delivery_note_input:
          bg: "#F5F9FF"
          border: "#ADEBF4"
          radius: 8
          placeholder: "Add delivery note..."
          max_chars: 200
        price_summary:
          rows: [product_total, delivery_fee, gst]
          total: { size: 20, weight: 700, color: "#0077B6" }
        cta:
          label: "Proceed to Payment"
          color: "#0077B6"
          height: 52
          sticky_bottom: true

    payment:
      id: PaymentScreen
      route: /customer/payment
      role: customer
      priority: P0
      payment_methods:
        upi:
          items:
            - UPIInput: { border: "#ADEBF4", active: "#0077B6" }
            - AppLogos: [GPay, PhonePe, Paytm, BHIM]
          selected_border: "#0077B6"
        cash_on_delivery:
          icon_color: "#E67E22"
          badge: { text: "No extra charges", color: "#27AE60" }
        wallet:
          state: premium_locked_if_empty
          add_money_link: true
      coupon_input:
        - CouponField: { border: "#ADEBF4" }
        - ApplyButton: { color: "#0077B6" }
      price_summary:
        sticky_bottom: true
        total_color: "#0077B6"
      cta:
        label: "Place Order — ₹{total}"
        color: "#0077B6"
        height: 52

    order_confirmation:
      id: OrderConfirmationScreen
      route: /customer/order/confirmed
      role: customer
      priority: P0
      components:
        - AnimatedCheckmark: { color: "#27AE60", size: 64, animated: true }
        - OrderIDText: { font: monospace, copiable: true }
        - DeliveryOTPBox:
            bg: "#E8F4FD"
            border: "#0077B6"
            border_width: 2
            otp_size: 40
            otp_color: "#0077B6"
            letter_spacing: 8
            caption: "Share only with delivery person"
            priority: CRITICAL
        - ETAText: { icon: clock, color: "#F59E0B" }
        - TrackOrderButton: { style: outlined, color: "#0077B6" }
        - BackToHomeButton: { color: "#0077B6" }

    order_tracking:
      id: OrderTrackingScreen
      route: /customer/order/:id/track
      role: customer
      priority: P0
      components:
        - CancelOrderLink:
            condition: "status in [placed, accepted]"
            color: "#C0392B"
            priority: CRITICAL
        - EditAddressButton:
            condition: "status === placed"
            priority: CRITICAL
        - StatusTimeline:
            steps:
              - placed: { icon: checkmark, complete_color: "#27AE60" }
              - accepted: { icon: checkmark, complete_color: "#27AE60" }
              - preparing: { icon: pulse, active_color: "#0077B6" }
              - out_for_delivery: { icon: empty, pending_color: "#ADEBF4" }
