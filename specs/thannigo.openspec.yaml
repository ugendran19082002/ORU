          state_on:
            bg: "#E8F5E9"
            border: "#27AE60"
            label: "Accepting Orders"
            label_color: "#27AE60"
          state_off:
            bg: "#FFEBEE"
            border: "#C0392B"
            label: "Paused — Not Accepting"
            label_color: "#C0392B"
          capacity_counter: { label: "Capacity: {n}/hr", editable: true }
          busy_mode_chip: { on: "#E67E22", off: outlined }
