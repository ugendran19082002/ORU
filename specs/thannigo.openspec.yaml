# =============================================================================
# WORKFLOWS — ROLE-WISE
# =============================================================================
workflows:
  customer:
    first_time_setup:
      steps:
        - Download app → Splash → Onboarding (3 slides)
        - Login with phone + OTP
        - Set up profile (name, photo)
        - Add delivery address (home/office/other)
        - Set default address
        - App auto-detects nearby shops

    place_order:
      steps:
        - Open app → Browse shops (list/map)
        - Filter shops (rating, distance, price)
        - Check shop is OPEN (real-time badge) [CRITICAL]
        - Tap shop → View shop profile
        - Check product availability [CRITICAL]
        - Select product + quantity (1-50 cans)
        - Add delivery notes
        - Choose Instant or Schedule delivery
        - View price breakdown (product + delivery + tax)
        - Choose payment (COD / UPI)
        - Confirm → Receive order ID + delivery OTP [CRITICAL]

    track_order:
      steps:
        - Receive order accepted notification
        - Track status timeline (Placed → Accepted → Preparing → Out → Delivered)
        - View delivery person info + call if needed [CRITICAL]
        - Confirm delivery with OTP [CRITICAL]

    cancel_order:
      steps:
        - Tap Cancel (only visible if placed/accepted)
        - Select cancel reason (mandatory) [CRITICAL]
        - Confirm cancellation

    reorder:
      steps:
        - Home screen → Tap Reorder banner [CRITICAL]
        - OR go to Order History → Tap Reorder on previous order
        - Confirm address + payment
        - Place order

    subscription:
      steps:
        - Browse shop → Choose subscription plan (daily/weekly/monthly)
        - Set delivery time slot + quantity
        - Choose payment method
        - Activate → Receive confirmation
        - Manage: Pause / Resume / Modify anytime

    complaint:
      steps:
        - Open completed order → Tap Report Issue [CRITICAL]
        - Select complaint type (late/wrong/quality/rude)
        - Add description + photos (optional)
        - Request Replacement OR Refund
        - Track complaint status

  shop_owner:
    onboarding:
      steps:
        - Download Shop App → Login with phone + OTP
        - Create shop profile (name, photo, description)
        - Set address + delivery radius
        - Set working hours (day-by-day)
        - Add products + prices (20L/10L/5L)
        - Set minimum stock threshold
        - Upload water quality certificate
        - Toggle Accept Orders → Go Live [CRITICAL]

    handle_orders:
      steps:
        - Receive new order alert (sound + vibrate) [CRITICAL]
        - View order details
        - Accept (with ETA) OR Reject (reason mandatory) [CRITICAL]
        - Mark Preparing → assign delivery person
        - Mark Out for Delivery
        - Delivery person completes → Mark Delivered
        - Upload proof photo if COD > ₹500 [CRITICAL]

    busy_hours:
      steps:
        - Enable Busy Mode (auto-reject) [CRITICAL]
        - Set delivery capacity (max orders/hr) [CRITICAL]
        - Block specific time slots
        - If order not accepted in 5 min → auto-reminder fires [CRITICAL]

    inventory_daily:
      steps:
        - Check full cans count [CRITICAL]
        - Check empty cans count [CRITICAL]
        - Each dispatch → stock auto-decrements
        - Empty cans returned → update count
        - Low stock alert fires when below threshold
        - Supplier delivers → Add stock

    end_of_day:
      steps:
        - View daily earnings summary
        - Check cash vs UPI breakdown
        - Run End-of-Day Reconciliation [CRITICAL]
        - Enter physical cash count
        - Confirm match or flag difference
        - Close day

    customer_management:
      steps:
        - Search customer (name/phone)
        - View profile (orders, spend, deposits)
        - Tag as VIP/Regular/New/Lost
        - Add notes for delivery preferences
        - Track can deposits per customer
        - Follow up on outstanding dues

  delivery_person:
    start_shift:
      steps:
        - Open Shop App → Start Delivery Mode
        - Set availability → Online
        - View assigned orders

    complete_delivery:
      steps:
        - Tap assigned order → View details
        - Navigate to customer (opens Maps)
        - Call/WhatsApp customer if needed
        - Hand over cans + collect empty cans
        - Collect payment (if COD)
        - Get OTP from customer [CRITICAL]
        - Mark Delivered + upload proof photo
        - If failed → Log failed delivery reason [CRITICAL]

