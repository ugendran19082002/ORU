project:
  name: Thannigo Water Delivery App (Frontend Only)
  type: Mobile App (Expo React Native)

goal:
  Build complete frontend UI with:
    - Customer App
    - Shop Admin UI
    - Delivery UI
    - No backend logic (use mock APIs / dummy data)

modules:
  auth_ui:
    screens:
      - splash_screen
      - onboarding
      - phone_login
      - otp_verification

  customer_ui:
    screens:
      - home_dashboard
      - search_filter_map
      - shop_profile
      - cart_checkout
      - order_summary
      - order_tracking
      - order_history
      - wallet
      - profile
      - rating_review

  shop_ui:
    screens:
      - dashboard
      - order_list
      - order_detail
      - inventory
      - earnings

  delivery_ui:
    screens:
      - assigned_orders
      - delivery_navigation
      - otp_verification
      - delivery_complete

ui_source:
  design_file: workflow_features/desing_screens_md.docx
  workflow_file: workflow_features/water_delivery_role_workflows.md
  features_file: workflow_features/features.xlsx
  screen: screens/*

tech_stack:
  framework: Expo React Native
  language: TypeScript
  navigation: React Navigation
  state: Zustand / Context API
  maps: react-native-maps / leaflet
  ui_lib: custom components

rules:
  coding:
    - use functional components
    - use hooks (useState, useEffect, custom hooks)
    - strict TypeScript
    - clean folder structure

  structure:
    - screens → page-level UI
    - components/ui → reusable UI (buttons, cards)
    - hooks → business logic
    - utils → helpers

  ui:
    - follow thannigo color system
    - consistent padding (8px grid)
    - rounded UI (12–20px radius)
    - mobile-first responsive

  state_management:
    - global state for user, cart, orders
    - avoid prop drilling

  api:
    - use mock JSON data
    - simulate API with async delays

agents:
  - name: frontend_agent
    role: Senior React Native Developer
    tasks:
      - create all screens from design spec
      - build reusable UI components
      - implement navigation (stack + tabs)
      - connect mock data
      - manage global state

  - name: ui_agent
    role: UI Engineer
    tasks:
      - ensure pixel-perfect UI
      - apply color system
      - improve UX interactions
      - animations (loading, success)

steps:
  - read_design_files
  - generate_ui_components
  - build_navigation_structure
  - create_all_screens
  - connect_mock_data
  - implement_state_management
  - add_animations
  - test_ui_flows
  - fix_ui_bugs
  - optimize_performance

navigation:
  customer_app:
    type: bottom_tabs
    tabs:
      - home
      - search
      - orders
      - wallet
      - profile

  shop_app:
    type: bottom_tabs
    tabs:
      - dashboard
      - orders
      - inventory
      - earnings

output:
  - fully functional UI app
  - navigation working
  - mock data integrated
  - reusable components library

constraints:
  performance:
    max_render_time: 1s

  usability:
    max_taps_to_order: 3

  ui_quality:
    pixel_perfect: true
    smooth_animations: true

logging:
  - ui_errors
  - navigation_logs
