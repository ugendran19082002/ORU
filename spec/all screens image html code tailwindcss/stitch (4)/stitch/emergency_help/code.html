<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo SOS Emergency</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#006a61",
                    "primary-container": "#0077be",
                    "primary-fixed-dim": "#9acbff",
                    "secondary-fixed": "#86f5e6",
                    "tertiary-fixed": "#b1f0d0",
                    "on-background": "#181c20",
                    "on-tertiary-container": "#e8fff0",
                    "surface-container-high": "#e6e8ee",
                    "on-primary": "#ffffff",
                    "surface-container": "#eceef3",
                    "on-secondary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#437e64",
                    "on-secondary-fixed-variant": "#005049",
                    "surface-container-highest": "#e0e2e8",
                    "outline-variant": "#c0c7d2",
                    "on-primary-fixed-variant": "#004a79",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#002114",
                    "tertiary": "#28654c",
                    "primary": "#005e97",
                    "secondary-fixed-dim": "#68d9ca",
                    "primary-fixed": "#cfe5ff",
                    "secondary-container": "#83f2e3",
                    "error": "#ba1a1a",
                    "inverse-surface": "#2d3135",
                    "surface-container-low": "#f2f3f9",
                    "surface": "#f7f9ff",
                    "outline": "#707882",
                    "inverse-primary": "#9acbff",
                    "surface-tint": "#00629e",
                    "on-secondary-container": "#006f65",
                    "on-error-container": "#93000a",
                    "background": "#f7f9ff",
                    "on-surface-variant": "#404751",
                    "tertiary-fixed-dim": "#96d4b5",
                    "surface-variant": "#e0e2e8",
                    "on-primary-container": "#f7f9ff",
                    "on-secondary-fixed": "#00201c",
                    "on-error": "#ffffff",
                    "surface-dim": "#d8dadf",
                    "surface-bright": "#f7f9ff",
                    "on-surface": "#181c20",
                    "inverse-on-surface": "#eff1f6",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#001d34",
                    "on-tertiary-fixed-variant": "#105139"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift {
            background-color: #f2f3f9;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f7f9ff]/80 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#181c20]/60 cursor-pointer">arrow_back</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl text-[#181c20]">Shop Admin</h1>
</div>
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-[10px] text-white font-bold" title="Admin Profile">AP</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto min-h-screen flex flex-col justify-center">
<!-- Emergency SOS Card -->
<section class="mb-8">
<div class="bg-surface-container-lowest rounded-3xl p-8 text-center shadow-[0_12px_32px_rgba(24,28,32,0.06)] relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-error/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -left-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
<div class="mb-6 relative inline-block">
<div class="w-20 h-20 bg-error-container rounded-full flex items-center justify-center animate-pulse">
<span class="material-symbols-outlined text-error text-4xl" style="font-variation-settings: 'FILL' 1;">emergency_home</span>
</div>
</div>
<h2 class="font-headline text-3xl font-extrabold text-[#FF5252] mb-2 tracking-tight">Emergency Help</h2>
<p class="text-on-surface-variant font-medium text-lg">Having an urgent issue?</p>
</div>
</section>
<!-- Quick Contact Buttons -->
<section class="space-y-4 mb-10">
<!-- Call Support -->
<button class="w-full h-[64px] bg-[#ba1a1a] text-white rounded-xl flex items-center justify-center gap-3 font-bold text-lg hover:opacity-90 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
                Call Support
            </button>
<!-- WhatsApp Support -->
<button class="w-full h-[64px] bg-[#25D366] text-white rounded-xl flex items-center justify-center gap-3 font-bold text-lg hover:opacity-90 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined">chat</span>
                WhatsApp Support
            </button>
<!-- Email Us -->
<button class="w-full h-[64px] border-2 border-primary text-primary rounded-xl flex items-center justify-center gap-3 font-bold text-lg hover:bg-primary/5 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined">mail</span>
                Email Us
            </button>
</section>
<!-- Common Issues -->
<section class="mb-12">
<h3 class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant mb-4 px-1">Common Issues</h3>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 bg-surface-container-high rounded-full text-on-surface-variant font-semibold text-sm hover:bg-primary-container hover:text-white transition-colors">
                    Water quality
                </button>
<button class="px-5 py-2.5 bg-surface-container-high rounded-full text-on-surface-variant font-semibold text-sm hover:bg-primary-container hover:text-white transition-colors">
                    Delivery not arrived
                </button>
<button class="px-5 py-2.5 bg-surface-container-high rounded-full text-on-surface-variant font-semibold text-sm hover:bg-primary-container hover:text-white transition-colors">
                    Wrong order
                </button>
</div>
</section>
<!-- Response Time Indicator -->
<div class="flex items-center justify-center gap-2 text-on-surface-variant font-medium text-sm bg-surface-container-low py-3 rounded-2xl">
<span class="w-2 h-2 bg-tertiary rounded-full"></span>
            Typically responds in 5 min
        </div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-[#f7f9ff]/80 backdrop-blur-md shadow-[0_12px_32px_rgba(24,28,32,0.06)] flex justify-around items-center px-4 py-3 pb-safe">
<div class="flex flex-col items-center justify-center text-[#181c20]/50">
<span class="material-symbols-outlined text-2xl">payments</span>
<span class="font-['Inter'] text-[10px] font-medium">Earnings</span>
</div>
<div class="flex flex-col items-center justify-center text-[#181c20]/50">
<span class="material-symbols-outlined text-2xl">insights</span>
<span class="font-['Inter'] text-[10px] font-medium">Analytics</span>
</div>
<div class="flex flex-col items-center justify-center text-[#181c20]/50">
<span class="material-symbols-outlined text-2xl">notifications</span>
<span class="font-['Inter'] text-[10px] font-medium">Alerts</span>
</div>
<div class="flex flex-col items-center justify-center text-[#0077BE] font-bold scale-110">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">emergency_home</span>
<span class="font-['Inter'] text-[10px] font-medium">SOS</span>
</div>
<div class="flex flex-col items-center justify-center text-[#181c20]/50">
<span class="material-symbols-outlined text-2xl">settings</span>
<span class="font-['Inter'] text-[10px] font-medium">Settings</span>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none -z-10">
<div class="absolute top-[20%] right-[10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[20%] left-[10%] w-[300px] h-[300px] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
