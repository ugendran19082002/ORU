<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cancel Order - Thannigo</title>

                    "colors": {
                        "surface-bright": "#f7f9ff",

                        "tertiary-container": "#437e64",
                        "surface-dim": "#d8dadf",
                        "inverse-primary": "#9acbff",
                        "secondary-fixed-dim": "#68d9ca",

                        "error": "#ba1a1a",
                        "surface-tint": "#00629e",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #005e97 0%, #0077be 100%);
        }
        .cancel-gradient {
            background: linear-gradient(135deg, #FF5252 0%, #d32f2f 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-[#f7f9ff]/80 dark:bg-slate-900/80 backdrop-blur-md">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-none">
<div class="flex items-center gap-4">
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full scale-95 active:duration-150 text-[#005e97] dark:text-[#0077be]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-[#005e97] dark:text-[#0077be] text-xl">Cancel Order</h1>
</div>
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full scale-95 active:duration-150 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Warning Card -->
<section class="bg-[#FFF3E0] border-2 border-[#FF9800] rounded-xl p-6 mb-8 relative overflow-hidden">
<div class="flex items-start gap-4">
<div class="bg-[#FF9800] text-white p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="report_problem" style="font-variation-settings: 'FILL' 1;">report_problem</span>
</div>
<div>
<h2 class="text-xl font-headline font-bold text-[#8a5200] mb-2">Are you sure?</h2>
<p class="text-sm text-[#8a5200]/80 mb-4 leading-relaxed">Cancelling this order might affect your customer reliability score and future eligibility for discounts.</p>
</div>
</div>
<div class="bg-white/50 rounded-lg p-4 mt-2">
<div class="flex justify-between items-center mb-1">
<span class="text-xs font-semibold uppercase tracking-wider text-[#8a5200]/60">Order #TN-94021</span>
<span class="text-xs font-bold text-[#8a5200]">Estimated Refund: $42.50</span>
</div>
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-lg bg-white overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="Gourmet fresh salad bowl with avocado and quinoa on a white ceramic plate, professional studio food photography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_mEGf6qjurtEsAK5WW3CMiguAHnbbMiXzUP46-8WNQbliMUayp9gEq_fB1L3ftLxgxSdEUd2LmRrxqzFd1VxrLyyt7XAMRu3Akyy9qqJfp1AyPlIPUxr3qxT3mHJxCH-UaVUV7EGeTJhtGPYi29711xGIn2MmMLdpKzs2V1ayTiWhbVJahxZWoWw9QQlhA1B3Wjdg7qDW8YDf9ceE05lspLz58mxk3q0EwdrS-3mTXUc7bzUIvKwGWPSxbIO1UtYrcY5yae4MBxk"/>
</div>
<div>
<p class="font-bold text-[#8a5200]">Fresh Avocado &amp; Quinoa Bowl</p>
<p class="text-sm text-[#8a5200]/70">Ordered 12 mins ago</p>
</div>
</div>
</div>
</section>
<!-- Cancel Reasons -->
<section class="mb-10">
<h3 class="text-lg font-headline font-bold text-on-surface mb-4 px-2">Reason for cancellation</h3>
<div class="space-y-3">
<!-- Option 1 -->
<label class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl cursor-pointer hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline" data-icon="location_off">location_off</span>
<span class="font-medium text-on-surface">Wrong address selected</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-active:scale-90 transition-transform"></div>
<input class="hidden" name="cancel_reason" type="radio"/>
</label>
<!-- Selected Option -->
<label class="flex items-center justify-between p-4 bg-[#EEF7FF] border-2 border-primary-container/20 rounded-xl cursor-pointer transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary-container" data-icon="error" style="font-variation-settings: 'FILL' 1;">error</span>
<span class="font-bold text-primary">Ordered by mistake</span>
</div>
<div class="w-6 h-6 rounded-full bg-primary-container flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-white"></div>
</div>
<input checked="" class="hidden" name="cancel_reason" type="radio"/>
</label>
<!-- Option 3 -->
<label class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl cursor-pointer hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline" data-icon="schedule">schedule</span>
<span class="font-medium text-on-surface">Delivery time is too long</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-active:scale-90 transition-transform"></div>
<input class="hidden" name="cancel_reason" type="radio"/>
</label>
<!-- Option 4 -->
<label class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl cursor-pointer hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline" data-icon="psychology">psychology</span>
<span class="font-medium text-on-surface">Changed my mind</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-active:scale-90 transition-transform"></div>
<input class="hidden" name="cancel_reason" type="radio"/>
</label>
<!-- Option 5 -->
<label class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl cursor-pointer hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline" data-icon="more_horiz">more_horiz</span>
<span class="font-medium text-on-surface">Other reasons</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-active:scale-90 transition-transform"></div>
<input class="hidden" name="cancel_reason" type="radio"/>
</label>
</div>
</section>
<!-- Additional Comments -->
<section class="mb-12">
<h3 class="text-sm font-headline font-bold text-on-surface-variant mb-3 px-2">Additional comments (Optional)</h3>
<textarea class="w-full h-32 bg-surface-container-high border-none rounded-xl p-4 focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="Tell us more about why you're cancelling..."></textarea>
</section>
<!-- Sticky Action Buttons -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-surface-bright/90 backdrop-blur-lg flex flex-col gap-3">
<button class="w-full h-[52px] cancel-gradient text-white rounded-xl font-headline font-bold tracking-tight shadow-lg shadow-red-500/20 active:scale-[0.98] transition-all">
                Yes, Cancel Order
            </button>
<button class="w-full h-[52px] bg-transparent text-primary font-headline font-bold hover:bg-primary/5 active:scale-[0.98] transition-all">
                No, Keep Order
            </button>
</div>
</main>
<!-- Shell Filter: Hide BottomNavBar because this is a focused Transactional screen -->
<!-- BottomNavBar Suppression Logic Applied -->
</body></html>
