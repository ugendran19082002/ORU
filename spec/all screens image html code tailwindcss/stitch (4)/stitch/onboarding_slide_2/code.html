<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo Onboarding - Fast Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {

                        "inverse-on-surface": "#eff1f6",

                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#005049",
                        "tertiary-fixed-dim": "#96d4b5",
                        "surface-tint": "#00629e",
                        "on-secondary-container": "#006f65",
                        "surface-bright": "#f7f9ff",
                        "secondary-fixed": "#86f5e6",
                        "surface-container": "#eceef3",
                        "on-primary-fixed-variant": "#004a79",
                        "primary-fixed": "#cfe5ff",
                        "on-tertiary-fixed-variant": "#105139",
                        "on-secondary-fixed": "#00201c",
                        "surface-container-low": "#f2f3f9",
                        "on-surface": "#181c20",
                        "primary-container": "#0077be",
                        "inverse-surface": "#2d3135",
                        "tertiary-container": "#437e64",
                        "on-tertiary-fixed": "#002114",
                        "secondary-container": "#83f2e3",
                        "tertiary": "#28654c",
                        "primary-fixed-dim": "#9acbff",
                        "outline-variant": "#c0c7d2",
                        "secondary": "#006a61",
                        "outline": "#707882",
                        "surface-variant": "#e0e2e8",
                        "surface-container-high": "#e6e8ee",
                        "on-primary-fixed": "#001d34",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d8dadf",
                        "primary": "#005e97",
                        "on-tertiary-container": "#e8fff0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #005e97 0%, #0077be 100%);
        }
        body {
            background-color: #ffffff; /* Explicitly required by instruction */
            color: #181c20;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary-fixed">
<!-- Content Suppression Rule: Navigation shell excluded for onboarding -->
<main class="relative h-screen w-full max-w-[390px] mx-auto overflow-hidden flex flex-col">
<!-- Header Utility -->
<div class="absolute top-0 left-0 w-full px-6 py-8 z-20 flex justify-end">
<button class="text-[13px] font-semibold text-outline hover:text-on-surface transition-colors">
                Skip
            </button>
</div>
<!-- Illustration Section (Top 55%) -->
<section class="relative h-[55%] w-full flex items-center justify-center pt-12 overflow-hidden">
<!-- Atmospheric Depth Background -->
<div class="absolute inset-0 bg-surface-container-low opacity-40 rounded-b-[48px]"></div>
<div class="relative z-10 w-full h-full flex items-center justify-center px-8">
<div class="relative w-full aspect-square max-w-[280px]">
<!-- Main Illustration -->
<img alt="Onboarding delivery graphic" class="w-full h-full object-contain mix-blend-multiply opacity-90" data-alt="Modern 3D style illustration showing a stylized blue water can flying through the air towards a minimalist house icon with motion lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWK7yGS0htZp5R2c2OcpGfUG0qdXPyWVwCtlJqqoIAlrpSn9yFtDjaWY0siJqz-8k51gNuzkb-rGj54Ad4ew7hJZN77OU71I53oDQYa5ny-BzSmNwN5MEhBJGwJVrJxTZMGdRY0i9HcJCXBQCR3NlWccFC8Rn32nOxhdG51bnrDp1hNlbaUJubMWHLSzvDU8o_ROaJygsR9IXN_a9DjV44IE5KHSmzU2k-23SoDH_BYkwbJqwNJa0R6TPCT5KK-NCy54Tyf8D8-aQ"/>
<!-- Floating Icon Overlay for Depth -->
<div class="absolute -bottom-4 -right-4 w-20 h-20 bg-surface-container-lowest rounded-2xl shadow-[0_12px_32px_rgba(24,28,32,0.06)] flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="touch_app">touch_app</span>
</div>
</div>
</div>
</section>
<!-- Text Block & Actions (Bottom 45%) -->
<section class="h-[45%] flex flex-col px-8 pt-10 pb-12 bg-white rounded-t-[40px] -mt-10 relative z-20 shadow-[0_-8px_40px_rgba(0,0,0,0.02)]">
<!-- Pagination Dots -->
<div class="flex justify-center gap-2 mb-8">
<div class="w-2 h-2 rounded-full bg-[#A0DEBF]"></div>
<div class="w-6 h-2 rounded-full primary-gradient transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-[#A0DEBF]"></div>
</div>
<!-- Content Area -->
<div class="text-center space-y-3 mb-auto">
<h1 class="font-headline text-[24px] font-bold leading-tight tracking-tight text-[#1A2340]">
                    Order in 2 Taps,<br/>Delivered in 30 Min
                </h1>
<p class="font-body text-[15px] leading-relaxed text-[#74777C] max-w-[280px] mx-auto">
                    Choose quantity, pay via UPI or Cash, track live.
                </p>
</div>
<!-- CTA Container -->
<div class="w-full space-y-4">
<!-- Primary Button -->
<button class="primary-gradient w-full h-[52px] rounded-xl flex items-center justify-center gap-2 text-white font-semibold shadow-[0_12px_32px_rgba(0,94,151,0.2)] active:scale-95 transition-transform">
<span>Next</span>
<span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
</main>
<!-- Style Helper for Material Symbols -->
<script>
        document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
            const iconName = icon.getAttribute('data-icon');
            if (iconName) icon.textContent = iconName;
            
            if (icon.getAttribute('data-weight') === 'fill') {
                icon.style.fontVariationSettings = "'FILL' 1";
            }
        });
    </script>
</body></html>
