<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo - Delivery Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f7f9ff",
                        "tertiary-fixed": "#b1f0d0",
                        "outline-variant": "#c0c7d2",
                        "secondary-container": "#83f2e3",
                        "on-primary-fixed": "#001d34",
                        "surface-variant": "#e0e2e8",
                        "on-tertiary-fixed-variant": "#105139",
                        "surface-container": "#eceef3",
                        "on-secondary-fixed-variant": "#005049",
                        "primary-fixed-dim": "#9acbff",
                        "on-primary": "#ffffff",
                        "primary-container": "#0077be",
                        "secondary-fixed": "#86f5e6",
                        "surface-container-high": "#e6e8ee",
                        "on-surface-variant": "#404751",
                        "tertiary-container": "#437e64",
                        "surface-dim": "#d8dadf",
                        "inverse-primary": "#9acbff",
                        "secondary-fixed-dim": "#68d9ca",
                        "on-primary-container": "#f7f9ff",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-tint": "#00629e",
                        "surface-container-low": "#f2f3f9",
                        "on-primary-fixed-variant": "#004a79",
                        "background": "#f7f9ff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2d3135",
                        "inverse-on-surface": "#eff1f6",
                        "surface-container-highest": "#e0e2e8",
                        "tertiary": "#28654c",
                        "primary-fixed": "#cfe5ff",
                        "outline": "#707882",
                        "on-tertiary-fixed": "#002114",
                        "on-secondary-fixed": "#00201c",
                        "on-tertiary-container": "#e8fff0",
                        "secondary": "#006a61",
                        "on-background": "#181c20",
                        "surface": "#f7f9ff",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#96d4b5",
                        "primary": "#005e97",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#006f65",
                        "on-surface": "#181c20",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-box-shadow {
            box-shadow: 0 12px 32px rgba(24, 28, 32, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f7f9ff]/80 backdrop-blur-md flex items-center justify-between px-6 h-16 w-full max-w-none">
<div class="flex items-center gap-4">
<button class="hover:bg-slate-100 transition-colors p-2 rounded-full scale-95 active:duration-150">
<span class="material-symbols-outlined text-[#005e97]">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl text-[#005e97]">Thannigo</h1>
</div>
<div class="flex items-center gap-3">
<button class="hover:bg-slate-100 transition-colors p-2 rounded-full scale-95 active:duration-150">
<span class="material-symbols-outlined text-[#005e97]">account_balance_wallet</span>
</button>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 flex flex-col items-center justify-start max-w-md mx-auto w-full">
<!-- Contextual Arrival Card -->
<div class="w-full bg-surface-container-lowest rounded-[24px] p-6 otp-box-shadow mb-8 relative overflow-hidden">
<div class="absolute top-0 right-0 p-4">
<span class="flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-tertiary opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-tertiary"></span>
</span>
</div>
<div class="flex items-center gap-4 mb-6">
<div class="w-16 h-16 rounded-full overflow-hidden border-2 border-primary-fixed">
<img alt="Ravi Kumar" class="w-full h-full object-cover" data-alt="professional portrait of a friendly delivery executive smiling with a warm lighting and blurred street background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOoawx9-pw8DcxDu7DzeTQTvZ0-bgXvdc8_bByhruzEj7gKXTiRvyDZNdAnwGe8dsQxlYYMMoMknAO-4nDvV_lEwKJxzAo0ULNLrFs8HAyNpWZi30fQSN65NmjhEmWhKi-PxT57XPQiSdMY6t-16wPOoFJAzgYXrFqfF1iF9iiXbuYlIouAJdQ6FEK4jzPDbD-UMQK76NTweVmYsm1Rbe6ri2ipj7UK8yRS-3NW77p5Jv9bYh0nlQwFE_zUb_5shO_h0My1clWc4E"/>
</div>
<div>
<h2 class="font-headline font-bold text-lg text-on-surface leading-tight">Ravi Kumar</h2>
<p class="text-on-surface-variant text-sm flex items-center gap-1">
<span class="material-symbols-outlined text-sm">stars</span>
                        4.9 • Delivery Partner
                    </p>
</div>
</div>
<div class="bg-primary-container/5 rounded-xl p-4 border border-primary-container/10">
<p class="text-on-surface font-medium text-center italic">
                    "Your order has arrived! Give the OTP"
                </p>
</div>
</div>
<!-- Verification Section -->
<div class="w-full bg-[#EEF7FF] rounded-[32px] p-8 flex flex-col items-center">
<div class="mb-6 text-center">
<span class="material-symbols-outlined text-primary-container text-4xl mb-2">verified_user</span>
<h3 class="font-headline font-extrabold text-2xl text-on-surface tracking-tight">Delivery Verification</h3>
</div>
<!-- OTP Input Display -->
<div class="flex gap-3 mb-8">
<div class="w-14 h-16 bg-surface-container-lowest border-2 border-[#0077BE] rounded-xl flex items-center justify-center otp-box-shadow">
<span class="text-2xl font-bold text-primary-container">4</span>
</div>
<div class="w-14 h-16 bg-surface-container-lowest border-2 border-[#0077BE] rounded-xl flex items-center justify-center otp-box-shadow">
<span class="text-2xl font-bold text-primary-container">8</span>
</div>
<div class="w-14 h-16 bg-surface-container-lowest border-2 border-[#0077BE] rounded-xl flex items-center justify-center otp-box-shadow">
<span class="text-2xl font-bold text-primary-container">2</span>
</div>
<div class="w-14 h-16 bg-surface-container-lowest border-2 border-[#0077BE] rounded-xl flex items-center justify-center otp-box-shadow">
<span class="text-2xl font-bold text-primary-container">7</span>
</div>
</div>
<p class="text-on-surface-variant text-center text-sm px-4 mb-6 leading-relaxed">
                Share this 4-digit OTP only with your delivery person
            </p>
<button class="flex items-center gap-2 text-primary-container font-semibold hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-lg">refresh</span>
                Refresh OTP
            </button>
</div>
<!-- Success Indicator (Hidden state suggested by prompt but rendered for visual confirmation) -->
<div class="mt-8 flex items-center gap-3 bg-tertiary-fixed/30 px-6 py-3 rounded-full border border-tertiary-fixed">
<div class="bg-tertiary text-white rounded-full p-1 flex items-center justify-center">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-tertiary font-bold font-headline">Delivery Confirmed!</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-[#f7f9ff]/80 backdrop-blur-md rounded-t-[24px] shadow-[0_-12px_32px_rgba(24,28,32,0.06)] flex justify-around items-center w-full px-4 h-20 pb-safe">
<div class="flex flex-col items-center justify-center text-[#181c20] px-4 py-1.5 hover:opacity-80 transition-opacity scale-95 active:duration-150">
<span class="material-symbols-outlined">home</span>
<span class="font-['Inter'] text-[11px] font-medium">Home</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#0077be] text-white rounded-[14px] px-4 py-1.5 hover:opacity-80 transition-opacity scale-95 active:duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-['Inter'] text-[11px] font-medium">Orders</span>
</div>
<div class="flex flex-col items-center justify-center text-[#181c20] px-4 py-1.5 hover:opacity-80 transition-opacity scale-95 active:duration-150">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Inter'] text-[11px] font-medium">Wallet</span>
</div>
<div class="flex flex-col items-center justify-center text-[#181c20] px-4 py-1.5 hover:opacity-80 transition-opacity scale-95 active:duration-150">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[11px] font-medium">Account</span>
</div>
</nav>
</body></html>
