<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo Splash Screen</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#d8dadf",
                    "outline-variant": "#c0c7d2",
                    "primary-fixed": "#cfe5ff",
                    "surface": "#f7f9ff",
                    "inverse-surface": "#2d3135",
                    "surface-container-low": "#f2f3f9",
                    "secondary-container": "#83f2e3",
                    "on-tertiary-fixed": "#002114",
                    "tertiary-fixed-dim": "#96d4b5",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#e0e2e8",
                    "on-tertiary-fixed-variant": "#105139",
                    "secondary": "#006a61",
                    "on-secondary-fixed-variant": "#005049",
                    "on-error-container": "#93000a",
                    "outline": "#707882",
                    "tertiary-container": "#437e64",
                    "on-surface": "#181c20",
                    "surface-bright": "#f7f9ff",
                    "surface-container": "#eceef3",
                    "background": "#f7f9ff",
                    "tertiary-fixed": "#b1f0d0",
                    "on-primary-fixed": "#001d34",
                    "on-secondary-fixed": "#00201c",
                    "surface-variant": "#e0e2e8",
                    "on-secondary-container": "#006f65",
                    "primary": "#005e97",
                    "surface-tint": "#00629e",
                    "on-background": "#181c20",
                    "primary-container": "#0077be",
                    "primary-fixed-dim": "#9acbff",
                    "on-primary-fixed-variant": "#004a79",
                    "inverse-on-surface": "#eff1f6",
                    "surface-container-high": "#e6e8ee",
                    "on-surface-variant": "#404751",
                    "on-tertiary-container": "#e8fff0",
                    "on-error": "#ffffff",
                    "inverse-primary": "#9acbff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#f7f9ff",
                    "tertiary": "#28654c",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#86f5e6",
                    "secondary-fixed-dim": "#68d9ca"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Epilogue"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .bg-splash-gradient {
            background: linear-gradient(180deg, #0077BE 0%, #48BCAE 100%);
        }
        .ripple-ring {
            border: 2px solid #A0DEBF;
            opacity: 0.4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body antialiased">
<!-- Splash Screen Container (Mobile Viewport Simulation) -->
<main class="relative mx-auto h-[844px] w-[390px] overflow-hidden shadow-2xl bg-splash-gradient flex flex-col items-center justify-center">
<!-- Shop Admin Badge -->
<div class="absolute top-12 right-6 px-3 py-1 bg-[#1A2340] rounded-full">
<span class="text-[10px] font-bold text-white tracking-widest font-label">SHOP ADMIN</span>
</div>
<!-- Central Identity Cluster -->
<div class="relative flex flex-col items-center">
<!-- Decorative Ripple Rings -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="ripple-ring w-64 h-64 rounded-full scale-100"></div>
<div class="ripple-ring absolute w-48 h-48 rounded-full scale-100 opacity-20"></div>
</div>
<!-- Brand Icon -->
<div class="relative z-10 w-24 h-24 bg-white/10 backdrop-blur-md rounded-[2.5rem] flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-white text-6xl" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<!-- Text Content -->
<div class="mt-8 text-center z-10">
<h1 class="font-headline text-[32px] font-extrabold text-white leading-tight tracking-tight">
                    Thannigo
                </h1>
<p class="font-body text-[14px] text-white/80 mt-2 font-medium">
                    Pure water, delivered fast.
                </p>
</div>
</div>
<!-- Footer Loading Indicators -->
<div class="absolute bottom-16 flex space-x-3">
<div class="w-2 h-2 bg-white rounded-full"></div>
<div class="w-2 h-2 bg-white/40 rounded-full"></div>
<div class="w-2 h-2 bg-white/20 rounded-full"></div>
</div>
<!-- Location Context (Visual Anchor for Bangalore/Koramangala) -->
<div class="absolute bottom-8 text-center">
<div class="flex items-center justify-center space-x-1 text-white/60">
<span class="material-symbols-outlined text-[14px]" data-icon="location_on">location_on</span>
<span class="text-[11px] font-label uppercase tracking-widest">Koramangala • Bangalore</span>
</div>
</div>
<!-- Content Mask / Subtle Texture Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]" data-alt="subtle geometric cube pattern texture overlay for depth"></div>
<!-- Bottom Safe Area Decoration -->
<div class="absolute bottom-2 w-32 h-1 bg-white/20 rounded-full"></div>
</main>
<!-- Fallback/Desktop Note -->
<div class="hidden md:block fixed bottom-4 right-4 bg-white p-4 rounded-xl shadow-lg max-w-xs border border-outline-variant">
<p class="text-on-surface text-sm font-medium">Mobile Viewport: 390x844px</p>
<p class="text-on-surface-variant text-xs mt-1">This design represents the mobile splash experience for Thannigo.</p>
</div>
</body></html>
