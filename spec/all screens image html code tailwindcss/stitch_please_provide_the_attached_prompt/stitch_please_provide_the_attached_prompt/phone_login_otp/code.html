<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo - Login</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "surface-container": "#eceef3",
                    "background": "#f7f9ff",
                    "tertiary-fixed": "#b1f0d0",
                    "on-primary-fixed": "#001d34",
                    "on-secondary-fixed": "#00201c",
                    "surface-variant": "#e0e2e8",
                    "on-secondary-container": "#006f65",
                    "primary": "#005e97",
                    "surface-tint": "#00629e",
                    "on-background": "#181c20",
                    "primary-container": "#0077be",

                    "on-primary-fixed-variant": "#004a79",
                    "inverse-on-surface": "#eff1f6",
                    "surface-container-high": "#e6e8ee",
                    "on-surface-variant": "#404751",

                    "on-error": "#ffffff",
                    "inverse-primary": "#9acbff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#f7f9ff",
                    "tertiary": "#28654c",
                    "error-container": "#ffdad6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            border-color: #0077be;
            background-color: #f7f9ff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 119, 190, 0.1);
        }
        body {
            background-color: #F4F6FA;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface flex flex-col items-center min-h-screen">
<!-- Top Branding Section -->
<header class="w-full max-w-[390px] pt-12 pb-8 px-8 flex flex-col items-center">
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="water_drop">water_drop</span>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary-container">Thannigo</h1>
</div>
<div class="w-full">
<h2 class="text-[#1A2340] text-[26px] font-bold font-headline leading-tight">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-1">Please enter your details to continue</p>
</div>
</header>
<!-- Main Canvas (Phone Login & OTP Container) -->
<main class="w-full max-w-[390px] px-6 space-y-8 flex-grow">
<!-- STATE 1: PHONE ENTRY -->
<section class="bg-surface-container-lowest p-8 rounded-[24px] shadow-sm border border-outline-variant/10" id="phone-state">
<div class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-bold text-outline uppercase tracking-wider ml-1">Phone Number</label>
<div class="flex items-center bg-surface-container-low border-2 border-[#A0DEBF] focus-within:border-primary-container rounded-xl overflow-hidden transition-all duration-300">
<div class="flex items-center gap-2 px-4 border-r border-outline-variant/30">
<span class="text-lg">🇮🇳</span>
<span class="text-on-surface font-semibold text-base">+91</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-4 text-on-surface font-medium placeholder:text-outline/50" maxlength="10" placeholder="10-digit number" type="tel"/>
</div>
</div>
<button class="w-full h-[52px] bg-primary-container text-on-primary-container font-semibold rounded-xl flex items-center justify-center hover:opacity-90 active:scale-[0.98] transition-all shadow-md shadow-primary-container/20">
                    Send OTP
                </button>
<div class="text-center">
<p class="text-sm text-on-surface-variant">
                        New user? <a class="text-primary-container font-bold hover:underline" href="#">Register here</a>
</p>
</div>
</div>
</section>
<!-- STATE 2: OTP ENTRY (Asymmetric Layout) -->
<section class="bg-surface-container-lowest p-8 rounded-[24px] shadow-sm border border-outline-variant/10" id="otp-state">
<div class="space-y-6">
<div>
<h3 class="text-sm font-semibold text-on-surface">Verification Code</h3>
<p class="text-[#74777C] text-sm mt-1">Enter OTP sent to <span class="font-bold text-on-surface">+91 98765XXXXX</span></p>
</div>
<!-- OTP Grid -->
<div class="grid grid-cols-6 gap-2">
<input class="otp-input w-full h-[58px] bg-[#EEF7FF] border border-[#A0DEBF] rounded-xl text-center text-xl font-bold text-primary-container transition-all" maxlength="1" type="text" value="4"/>
<input class="otp-input w-full h-[58px] bg-[#EEF7FF] border border-[#A0DEBF] rounded-xl text-center text-xl font-bold text-primary-container transition-all" maxlength="1" type="text" value="2"/>
<input class="otp-input w-full h-[58px] bg-[#EEF7FF] border border-[#A0DEBF] rounded-xl text-center text-xl font-bold text-primary-container transition-all" maxlength="1" type="text"/>
<input class="otp-input w-full h-[58px] bg-[#EEF7FF] border border-[#A0DEBF] rounded-xl text-center text-xl font-bold text-primary-container transition-all" maxlength="1" type="text"/>
<input class="otp-input w-full h-[58px] bg-[#EEF7FF] border border-[#A0DEBF] rounded-xl text-center text-xl font-bold text-primary-container transition-all" maxlength="1" type="text"/>
<input class="otp-input w-full h-[58px] bg-[#EEF7FF] border border-[#A0DEBF] rounded-xl text-center text-xl font-bold text-primary-container transition-all" maxlength="1" type="text"/>
</div>
<div class="flex justify-between items-center px-1">
<span class="text-[#FF9800] text-sm font-semibold flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]" data-icon="timer">timer</span>
                        00:30s
                    </span>
<button class="text-primary text-sm font-bold opacity-50 cursor-not-allowed">Resend OTP</button>
</div>
<button class="w-full h-[52px] bg-primary-container text-on-primary-container font-semibold rounded-xl flex items-center justify-center hover:opacity-90 active:scale-[0.98] transition-all shadow-md shadow-primary-container/20">
                    Verify
                </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-outline text-[10px] uppercase font-bold tracking-widest">Or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Biometric Option -->
<button class="w-full flex items-center justify-center gap-3 py-3 rounded-xl border border-primary-container/20 bg-primary/5 text-primary-container font-semibold hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
<span>Use Fingerprint</span>
</button>
</div>
</section>
</main>
<!-- Footer Security Section -->
<footer class="w-full max-w-[390px] py-8 flex flex-col items-center">
<div class="flex items-center gap-2 px-4 py-2 bg-[#48BCAE]/10 rounded-full">
<span class="material-symbols-outlined text-[#48BCAE] text-[18px]" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[#48BCAE] text-xs font-bold uppercase tracking-wider">Secure login</span>
</div>
<!-- Decorative Graphic -->
<div class="mt-8 opacity-20 pointer-events-none">
<img alt="water ripples" class="w-full h-auto object-cover mask-image-gradient" data-alt="abstract liquid water ripples and waves with soft blue gradients and crystalline light refractions" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2pnRq6Z204obl0bpu9jY8RJAnmfPeTq9Ma6q07WEZ08_AcNync7HRVtFvkqxPBA-O6eOA4l-rZHhq6Mf0IBK4iFDmj2VPEmSyse8hLQd7b0xd1LYk3_sLY4ukxehx-PbPM56PuMp_39m4AYGRxuGcXzvWFnRJXGEE5RMSRDJbxwkj8yCZg8aLrN4UlspcmBQhJwrZ8VRJmvhD0MecU6tNvXP5aB6dcpQjMxm5Bh-OlUOGMD9rHM1jcke7aXs2GqdpPy1J6gQ35qI"/>
</div>
</footer>
<!-- CSS Masking for decorative image -->
<style>
        .mask-image-gradient {
            -webkit-mask-image: linear-gradient(to top, transparent, black);
            mask-image: linear-gradient(to top, transparent, black);
        }
    </style>
</body></html>
