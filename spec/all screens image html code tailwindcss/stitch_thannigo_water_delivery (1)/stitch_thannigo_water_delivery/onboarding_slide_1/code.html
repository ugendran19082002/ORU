<path class="opacity-80" d="M100 350 Q 200 320 250 200 T 350 100" fill="none" stroke="#48BCAE" stroke-dasharray="8 12" stroke-linecap="round" stroke-width="4"></path>
<path class="opacity-60" d="M50 200 Q 150 180 200 100" fill="none" stroke="#48BCAE" stroke-dasharray="10 10" stroke-linecap="round" stroke-width="3"></path>

<span class="material-symbols-outlined block text-[24px]" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
</div>
<div class="absolute top-1/2 right-1/4">

<span class="w-2 h-2 rounded-full bg-[#A0DEBF] transition-all"></span>

<button class="w-full h-[52px] bg-primary-container hover:bg-primary text-on-primary font-body font-bold text-base rounded-full shadow-[0_12px_32px_rgba(0,119,190,0.12)] transition-all active:scale-95 flex items-center justify-center gap-2">
