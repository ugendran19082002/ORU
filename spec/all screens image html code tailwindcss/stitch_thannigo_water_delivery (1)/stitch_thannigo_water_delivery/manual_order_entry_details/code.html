<div class="flex justify-between items-end">
<h2 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant">Customer Lookup</h2>
<div class="flex items-center gap-2 p-1 bg-surface-container-low rounded-xl">
<button class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-surface-container-lowest shadow-sm text-primary">Existing</button>

<div class="relative">

<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border-none rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline" placeholder="Search by name or mobile number..." type="text"/>
</div>
</section>
<!-- Section: Order Items -->
<section class="space-y-4">
<h2 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant">Order Items</h2>
<div class="bg-surface-container-lowest rounded-[24px] p-6 space-y-6 shadow-sm">

<div class="flex flex-wrap gap-2 flex-1">
<button class="px-4 py-2 rounded-xl text-sm font-semibold border-2 border-primary bg-primary/5 text-primary">20L Can</button>
<button class="px-4 py-2 rounded-xl text-sm font-semibold border-2 border-transparent bg-surface-container text-on-surface-variant hover:bg-surface-container-high">10L Can</button>
<button class="px-4 py-2 rounded-xl text-sm font-semibold border-2 border-transparent bg-surface-container text-on-surface-variant hover:bg-surface-container-high">5L Bottle</button>
</div>
<div class="flex items-center bg-surface-container-low rounded-xl p-1 gap-2">
<button class="w-8 h-8 flex items-center justify-center bg-surface-container-lowest rounded-lg shadow-sm text-on-surface active:scale-90 transition-transform">
<span class="material-symbols-outlined text-lg">remove</span>
</button>
<span class="w-8 text-center font-bold">03</span>
<button class="w-8 h-8 flex items-center justify-center bg-primary text-white rounded-lg shadow-sm active:scale-90 transition-transform">
<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
</div>

<button class="w-full py-4 border-2 border-dashed border-outline-variant rounded-2xl flex items-center justify-center gap-2 text-outline hover:text-primary hover:border-primary/50 transition-all group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">add_circle</span>
<span class="text-sm font-bold">Add Another Product</span>
</button>

<span class="text-on-surface-variant font-medium">Order Total</span>
<span class="text-2xl font-extrabold text-primary-container">₹90.00</span>
</div>
</div>
</section>

<div class="space-y-3">
<textarea class="w-full p-4 bg-surface-container-lowest border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/20 placeholder:text-outline text-sm resize-none" placeholder="Delivery Address" rows="3"></textarea>
<input class="w-full p-4 bg-surface-container-lowest border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/20 placeholder:text-outline text-sm" placeholder="Add delivery note (e.g., Gate code 1234)" type="text"/>

</div>
<div class="space-y-4">

<button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20">

                    </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 font-semibold text-sm">

                    </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 font-semibold text-sm">

<button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 font-semibold text-sm">

<div class="space-y-2">

<input checked="" class="w-5 h-5 text-primary border-outline focus:ring-primary" name="payment" type="radio"/>
<div class="flex-1">
<p class="font-bold text-sm">COD</p>
<p class="text-[10px] text-outline">Cash on Delivery</p>
</div>

<label class="flex items-center gap-4 p-4 bg-surface-container-lowest rounded-2xl cursor-pointer hover:bg-white transition-colors group">
<input class="w-5 h-5 text-primary border-outline focus:ring-primary" name="payment" type="radio"/>
<div class="flex-1">
<p class="font-bold text-sm">UPI</p>
<p class="text-[10px] text-outline">GPay, PhonePe, Paytm</p>
</div>
</label>
<label class="flex items-center gap-4 p-4 bg-surface-container-lowest rounded-2xl cursor-pointer hover:bg-white transition-colors group">
<input class="w-5 h-5 text-primary border-outline focus:ring-primary" name="payment" type="radio"/>
<div class="flex-1">
<p class="font-bold text-sm">Credit (Owed)</p>
<p class="text-[10px] text-outline">Add to customer balance</p>
</div>
</label>
</div>

<div class="bg-surface-container-lowest rounded-2xl p-4 space-y-4 shadow-sm">
<div class="relative">
<select class="w-full appearance-none bg-surface-container-low border-none rounded-xl py-3 pl-4 pr-10 text-sm font-semibold focus:ring-2 focus:ring-primary/20">

<option>Amit Singh (Zone B)</option>
<option>Suresh Raina (Zone C)</option>

<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>

<div class="flex items-center justify-between px-1">

<div class="w-2 h-2 rounded-full bg-[#28654c] animate-pulse"></div>

<button class="text-[11px] font-bold text-primary uppercase tracking-wider">View Map</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>

<span class="font-plus-jakarta text-[10px] font-semibold uppercase tracking-wider mt-1">New</span>

<a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-blue-500 transition-transform active:scale-90 duration-300" href="#">
