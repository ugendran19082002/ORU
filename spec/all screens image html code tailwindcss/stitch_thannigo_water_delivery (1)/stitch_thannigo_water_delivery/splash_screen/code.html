<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Plus_Jakarta_Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#c0c7d2",
                    "background": "#f7f9ff",
                    "surface-dim": "#d8dadf",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#105139",
                    "on-primary-fixed-variant": "#004a79",
                    "surface-container-high": "#e6e8ee",
                    "tertiary": "#28654c",
                    "tertiary-fixed": "#b1f0d0",
                    "surface": "#f7f9ff",
                    "primary-fixed": "#cfe5ff",
                    "surface-tint": "#00629e",
                    "on-secondary-fixed-variant": "#005049",
                    "on-secondary-fixed": "#00201c",
                    "surface-bright": "#f7f9ff",
                    "tertiary-fixed-dim": "#96d4b5",
                    "surface-container-low": "#f2f3f9",
                    "on-background": "#181c20",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#83f2e3",
                    "on-primary-fixed": "#001d34",
                    "on-error": "#ffffff",
                    "primary": "#005e97",
                    "on-error-container": "#93000a",
                    "outline": "#707882",
                    "secondary-fixed": "#86f5e6",
                    "primary-container": "#0077be",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#006f65",
                    "on-primary": "#ffffff",
                    "on-surface": "#181c20",
                    "primary-fixed-dim": "#9acbff",
                    "inverse-surface": "#2d3135",
                    "tertiary-container": "#437e64",
                    "secondary": "#006a61",
                    "inverse-primary": "#9acbff",
                    "surface-variant": "#e0e2e8",
                    "surface-container": "#eceef3",
                    "on-tertiary-fixed": "#002114",
                    "on-surface-variant": "#404751",
                    "on-primary-container": "#f7f9ff",
                    "surface-container-highest": "#e0e2e8",
                    "inverse-on-surface": "#eff1f6",
                    "secondary-fixed-dim": "#68d9ca",
                    "on-tertiary-container": "#e8fff0"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        .ripple-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .ripple {
            border: 2px solid #A0DEBF;
            opacity: 0.3;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary flex flex-col items-center justify-between min-h-screen">
<!-- Splash Screen Container (390x844 Contextual Mobile Frame) -->
<div class="relative w-full h-screen max-w-[390px] mx-auto overflow-hidden flex flex-col justify-between bg-gradient-to-b from-[#0077BE] to-[#48BCAE]">
<!-- Status Bar Simulation -->
<div class="w-full h-11 flex justify-between items-center px-8 z-10">
<span class="text-white text-sm font-semibold">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-white text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-white text-[18px]">wifi</span>
<span class="material-symbols-outlined text-white text-[20px]">battery_full</span>
</div>
</div>
<!-- Ripple Effect Decoration -->
<div class="ripple-container">
<div class="ripple w-48 h-48"></div>
<div class="ripple w-72 h-72"></div>
<div class="ripple w-96 h-96"></div>
</div>
<!-- Center Content -->
<div class="flex flex-col items-center justify-center flex-grow z-10 px-6 text-center">
<!-- App Icon (20L Can Icon) -->
<div class="w-24 h-24 mb-8 flex items-center justify-center bg-white/10 backdrop-blur-md rounded-full shadow-2xl">
<span class="material-symbols-outlined text-white text-[64px]" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<!-- Brand Identity -->
<h1 class="text-white text-[32px] font-extrabold font-headline tracking-[2px] leading-tight mb-2 drop-shadow-md">
                Thannigo
            </h1>
<p class="text-white/80 text-sm font-medium font-body tracking-wide">
                Pure water, delivered fast.
            </p>
</div>
<!-- Loading & Footer -->
<div class="pb-16 flex flex-col items-center gap-10 z-10">
<!-- Loading Dots -->
<div class="flex gap-2.5">
<div class="w-2 h-2 rounded-full bg-white"></div>
<div class="w-2 h-2 rounded-full bg-white/60"></div>
<div class="w-2 h-2 rounded-full bg-white/30"></div>
</div>
<!-- Home Indicator (iOS Style) -->
<div class="w-32 h-1 bg-white/40 rounded-full"></div>
</div>
<!-- Background Image/Texture for Depth (Abstract Glassmorphism) -->
<div class="absolute inset-0 pointer-events-none mix-blend-overlay opacity-20" data-alt="abstract soft light diffusion on blue and teal gradient background with smooth transitions" style="background-image: radial-gradient(circle at 20% 30%, white 0%, transparent 40%);">
</div>
</div>
<!-- Hidden Logic for Components (as defined in instructions) -->
<!-- Note: TopAppBar and BottomNavBar are suppressed as per "The Destination Rule" for splash screens -->
</body></html>
