<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo - Login</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#68d9ca",
                        "on-background": "#181c20",
                        "on-tertiary-fixed-variant": "#105139",
                        "on-primary-container": "#f7f9ff",
                        "surface-tint": "#00629e",
                        "surface-container-low": "#f2f3f9",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-surface": "#181c20",
                        "surface-bright": "#f7f9ff",
                        "on-secondary-fixed-variant": "#005049",
                        "inverse-surface": "#2d3135",
                        "surface-container-high": "#e6e8ee",
                        "error": "#ba1a1a",
                        "surface-container": "#eceef3",
                        "on-primary-fixed-variant": "#004a79",
                        "on-surface-variant": "#404751",
                        "background": "#f7f9ff",
                        "tertiary": "#28654c",
                        "inverse-on-surface": "#eff1f6",
                        "primary-fixed-dim": "#9acbff",
                        "surface-container-highest": "#e0e2e8",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#001d34",
                        "primary-container": "#0077be",
                        "primary": "#005e97",
                        "tertiary-container": "#437e64",
                        "primary-fixed": "#cfe5ff",
                        "surface-dim": "#d8dadf",
                        "secondary-fixed": "#86f5e6",
                        "tertiary-fixed": "#b1f0d0",
                        "error-container": "#ffdad6",
                        "secondary": "#006a61",
                        "outline-variant": "#c0c7d2",
                        "surface-variant": "#e0e2e8",
                        "secondary-container": "#83f2e3",
                        "surface": "#f7f9ff",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#96d4b5",
                        "on-tertiary-fixed": "#002114",
                        "on-secondary-container": "#006f65",
                        "inverse-primary": "#9acbff",
                        "outline": "#707882",
                        "on-tertiary-container": "#e8fff0",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#00201c",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F4F6FA;
            font-family: 'Inter', sans-serif;
        }
        .hero-gradient {
            background: linear-gradient(135deg, #005e97 0%, #0077be 100%);
        }
        .editorial-asymmetry {
            margin-top: -24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center min-h-screen p-6">
<!-- Login Container -->
<main class="w-full max-w-[390px] mx-auto flex flex-col items-center">
<!-- Surface Card -->
<div class="w-full bg-white rounded-[24px] shadow-[0_12px_40px_-12px_rgba(0,94,151,0.15)] p-8 relative overflow-hidden">
<!-- Logo Section -->
<div class="flex justify-center mb-8">
<div class="w-12 h-12 rounded-xl flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
</div>
<!-- Header Section -->
<div class="text-center mb-10">
<h1 class="font-headline font-bold text-[26px] text-[#1A2340] leading-tight mb-2">Welcome back</h1>
<p class="font-body text-[14px] text-[#74777C]">Enter your phone number to continue</p>
</div>
<!-- Form Section -->
<form class="space-y-6" onsubmit="return false;">
<!-- Phone Input Field -->
<div class="relative">
<div class="flex items-center w-full h-[56px] border-[1.5px] border-[#A0DEBF] focus-within:border-[2px] focus-within:border-primary-container rounded-[12px] bg-white transition-all duration-200 px-4">
<span class="text-primary-container font-semibold text-[16px] mr-3">+91</span>
<div class="w-[1px] h-6 bg-surface-container-high mr-3"></div>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-[#181c20] font-medium placeholder:text-outline/50 text-[16px] p-0" maxlength="10" placeholder="10-digit number" type="tel"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[52px] hero-gradient text-white font-headline font-bold rounded-[14px] shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform duration-150 flex items-center justify-center tracking-wide" type="submit">
                    Send OTP
                </button>
</form>
<!-- Registration Link -->
<div class="mt-8 text-center">
<p class="font-body text-[14px] text-on-surface">
                    New user? 
                    <a class="text-primary-container font-semibold hover:underline underline-offset-4" href="#">Register here</a>
</p>
</div>
</div>
<!-- Terms and Privacy Footer -->
<footer class="mt-8 px-8 text-center">
<p class="text-[11px] leading-relaxed text-[#74777C] font-body">
                By continuing, you agree to our 
                <a class="underline underline-offset-2 hover:text-primary transition-colors" href="#">Terms</a> &amp; 
                <a class="underline underline-offset-2 hover:text-primary transition-colors" href="#">Privacy Policy</a>
</p>
</footer>
</main>
<!-- Background Decoration: Subtle Abstract Water Shapes -->
<div class="fixed top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[80px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-secondary/5 rounded-full blur-[60px] -z-10"></div>
</body></html>
