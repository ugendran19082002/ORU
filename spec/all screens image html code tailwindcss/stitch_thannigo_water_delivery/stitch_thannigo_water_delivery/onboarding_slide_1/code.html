<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thannigo - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#68d9ca",
                        "on-background": "#181c20",
                        "on-tertiary-fixed-variant": "#105139",
                        "on-primary-container": "#f7f9ff",
                        "surface-tint": "#00629e",
                        "surface-container-low": "#f2f3f9",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-surface": "#181c20",
                        "surface-bright": "#f7f9ff",
                        "on-secondary-fixed-variant": "#005049",
                        "inverse-surface": "#2d3135",
                        "surface-container-high": "#e6e8ee",
                        "error": "#ba1a1a",
                        "surface-container": "#eceef3",
                        "on-primary-fixed-variant": "#004a79",
                        "on-surface-variant": "#404751",
                        "background": "#f7f9ff",
                        "tertiary": "#28654c",
                        "inverse-on-surface": "#eff1f6",
                        "primary-fixed-dim": "#9acbff",
                        "surface-container-highest": "#e0e2e8",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#001d34",
                        "primary-container": "#0077be",
                        "primary": "#005e97",
                        "tertiary-container": "#437e64",
                        "primary-fixed": "#cfe5ff",
                        "surface-dim": "#d8dadf",
                        "secondary-fixed": "#86f5e6",
                        "tertiary-fixed": "#b1f0d0",
                        "error-container": "#ffdad6",
                        "secondary": "#006a61",
                        "outline-variant": "#c0c7d2",
                        "surface-variant": "#e0e2e8",
                        "secondary-container": "#83f2e3",
                        "surface": "#f7f9ff",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#96d4b5",
                        "on-tertiary-fixed": "#002114",
                        "on-secondary-container": "#006f65",
                        "inverse-primary": "#9acbff",
                        "outline": "#707882",
                        "on-tertiary-container": "#e8fff0",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#00201c",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .asymmetric-clip {
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- ONBOARDING SHELL: Linear/Transactional Flow (Nav Suppressed) -->
<main class="relative h-screen w-full flex flex-col max-w-[430px] mx-auto bg-surface-container-lowest shadow-2xl">
<!-- Top Utility Bar: Skip -->
<div class="absolute top-0 left-0 w-full p-6 z-20 flex justify-end items-center">
<button class="text-on-surface-variant font-semibold text-sm tracking-wide px-4 py-2 hover:bg-surface-container transition-colors rounded-full">
                Skip
            </button>
</div>
<!-- Illustration Section (Top 55%) -->
<div class="relative h-[55%] w-full overflow-hidden bg-surface-container">
<!-- Background Map with Tonal Layering -->
<div class="absolute inset-0 opacity-40">
<img class="w-full h-full object-cover" data-alt="Modern minimalist city map top view with clean grey and white aesthetic streets and block shapes" data-location="Metropolitan Area" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCiLxICtfjykrfexxp8m7VlxvuH8smBEHWHjszR5bzG7TTMKevB8v6ZEDCjiig0e6--gPPYmTHBegNM2U4xEWAx-WivZ6eUL2GAdNu8YGGXdQ1KR1tnKx_6-FaH-zyChSy4XqS7PDW_bCsEs4hH7_J3rIFuveYCVqQzyHGodTfTYN3GQpgt-_m0nzxpbjfv5irk1oLw71n3billX-3EtP67aviwtqxw98t4iOqOMKv_yRAL89k2uqDOf_UNSSGIbhX4Oq_m_Am_6tL_"/>
</div>
<!-- Custom UI Illustration: Interactive Map Simulation -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none p-12">
<div class="relative w-full h-full">
<!-- Path Overlay (Teal Route Lines) -->
<svg class="absolute inset-0 w-full h-full" fill="none" viewbox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<path class="opacity-80" d="M50 350C100 300 200 350 300 200C350 125 320 80 350 50" stroke="#83f2e3" stroke-dasharray="8 8" stroke-linecap="round" stroke-width="4"></path>
</svg>
<!-- Blue Shop Pins (Material Design) -->
<!-- Pin 1 -->
<div class="absolute top-[20%] left-[60%] flex flex-col items-center">
<div class="bg-primary-container p-2 rounded-full shadow-lg transform -translate-y-2">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div class="w-1.5 h-1.5 bg-primary-container rounded-full mt-[-4px]"></div>
</div>
<!-- Pin 2 -->
<div class="absolute top-[45%] left-[30%] flex flex-col items-center">
<div class="bg-primary-container p-2 rounded-full shadow-lg transform -translate-y-2">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div class="w-1.5 h-1.5 bg-primary-container rounded-full mt-[-4px]"></div>
</div>
<!-- Pin 3 (Active) -->
<div class="absolute top-[65%] left-[75%] flex flex-col items-center">
<div class="bg-secondary p-3 rounded-full shadow-[0_0_20px_rgba(0,106,97,0.4)] transform -translate-y-2 scale-110">
<span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">store</span>
</div>
<div class="w-2 h-2 bg-secondary rounded-full mt-[-4px]"></div>
</div>
</div>
</div>
<!-- Glassmorphism Gradient Overlay for editorial feel -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface-container-lowest to-transparent"></div>
</div>
<!-- Text Block (Bottom 45%) -->
<div class="flex-1 flex flex-col items-center px-10 pb-12 pt-8 text-center bg-surface-container-lowest rounded-t-[2.5rem] mt-[-2.5rem] relative z-10">
<!-- Headline: Editorial Style -->
<h1 class="font-headline text-[26px] font-extrabold text-on-background leading-tight tracking-tight mb-4">
                Find Pure Water Near You
            </h1>
<!-- Body: High Readability -->
<p class="font-body text-[15px] leading-relaxed text-on-surface-variant max-w-[280px]">
                Browse 200+ verified local water suppliers within 3km.
            </p>
<!-- Spacer for visual breathing room -->
<div class="flex-1"></div>
<!-- Pagination Dots (Horizontal Centered) -->
<div class="flex items-center justify-center gap-2 mb-10">
<span class="w-10 h-2.5 rounded-full bg-primary-container transition-all duration-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-secondary-fixed transition-all duration-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-secondary-fixed transition-all duration-300"></span>
</div>
<!-- Next Button (Editorial Component Style) -->
<div class="w-full">
<button class="w-full h-[52px] bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-base rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2">
                    Next
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Subtle Texture Background (Outside phone frame) -->
<div class="fixed inset-0 -z-50 bg-surface-container opacity-50 pointer-events-none"></div>
</body></html>
